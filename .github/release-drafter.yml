name-template: '$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - feat
      - feature
      - enhancement
  - title: '🐛 Fixes'
    labels:
      - fix
      - bug
      - bugfix
  - title: '🔧 Maintenance'
    labels:
      - chore
      - maintenance
      - refactor
  - title: '📚 Docs'
    labels:
      - docs
      - documentation
  - title: '⚠️ Breaking'
    labels:
      - breaking
      - breaking-change
  - title: '🔨 Dependencies'
    labels:
      - deps
      - dependencies
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
no-changes-template: '- No changes'
sort-by: title
template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
