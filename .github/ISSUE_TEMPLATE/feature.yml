name: ✨ Feature Request
description: Suggest a new feature or improvement
type: Feature

body:
  - type: textarea
    id: what
    attributes:
      label: What do you want?
      placeholder: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why do you want it?
      placeholder: Explain your use case and why this would be valuable
    validations:
      required: true

  - type: textarea
    id: workarounds
    attributes:
      label: Have you tried any workarounds?
      placeholder: Describe any alternatives you've tried

  - type: checkboxes
    id: help
    attributes:
      label: Would you help implement this?
      options:
        - label: I'm willing to help implement this feature

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Low
        - Medium
        - High

  - type: input
    id: related
    attributes:
      label: Related issues
      placeholder: '#123, #456'
