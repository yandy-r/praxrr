name: ✨ Feature Request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Profilarr? We'd love to hear it. Please check
        [existing feature requests](https://github.com/yandy-r/profilarr/issues?q=is%3Aissue+label%3Aenhancement)
        before filing to avoid duplicates.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and this feature has not already been requested.
          required: true

  - type: textarea
    id: what
    attributes:
      label: What do you want?
      placeholder: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why do you want it?
      placeholder: Explain your use case and why this would be valuable
    validations:
      required: true

  - type: textarea
    id: workarounds
    attributes:
      label: Have you tried any workarounds?
      placeholder: Describe any alternatives you've tried

  - type: checkboxes
    id: help
    attributes:
      label: Would you help implement this?
      options:
        - label: I'm willing to help implement this feature

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Low
        - Medium
        - High

  - type: input
    id: related
    attributes:
      label: Related issues
      placeholder: '#123, #456'
