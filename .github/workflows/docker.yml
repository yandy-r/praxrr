name: Docker

on:
  push:
    branches:
      - v2-lidarr
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/yandy-r

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      matrix:
        include:
          - image: profilarr
            dockerfile: Dockerfile
          - image: profilarr-parser
            dockerfile: Dockerfile.parser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/v2-lidarr" ]]; then
            echo "value=develop" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v*-beta* ]]; then
            echo "value=beta" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=stable" >> $GITHUB_OUTPUT
          else
            echo "value=develop" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            # Branch push -> v2-lidarr
            type=raw,value=v2-lidarr,enable=${{ github.ref == 'refs/heads/v2-lidarr' }}
            # Lidarr tag -> v2-lidarr + exact tag
            type=raw,value=v2-lidarr,enable=${{ startsWith(github.ref, 'refs/tags/v2-lidarr.') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v2-lidarr.') }}
            # Beta tag -> beta + version
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-beta') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-beta') }}
            # Stable tag -> latest + version
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !startsWith(github.ref, 'refs/tags/v2-lidarr.') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !startsWith(github.ref, 'refs/tags/v2-lidarr.') }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # FOR NOW: ARM disabled for faster debugging - re-enable linux/arm64 when stable
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_CHANNEL=${{ steps.channel.outputs.value }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/${{ matrix.image }}:buildcache,mode=max

      - name: Generate attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
