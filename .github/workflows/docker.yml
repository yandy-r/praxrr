name: Docker

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
    tags:
      - 'app/v*'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/yandy-r

jobs:
  parser-image-smoke:
    uses: ./.github/workflows/parser-container-smoke.yml
    permissions:
      contents: read

  build:
    needs: parser-image-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      matrix:
        include:
          - image: praxrr
            dockerfile: Dockerfile
            platforms: linux/amd64
          - image: praxrr-parser
            dockerfile: Dockerfile.parser
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/app/v* ]]; then
            VERSION="${GITHUB_REF_NAME#app/v}"
            echo "value=${VERSION}" >>"${GITHUB_OUTPUT}"
            echo "is_release=true" >>"${GITHUB_OUTPUT}"
          else
            echo "value=" >>"${GITHUB_OUTPUT}"
            echo "is_release=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine channel
        id: channel
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "value=develop" >>"${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "value=testing" >>"${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF}" == refs/tags/app/v*-beta* ]]; then
            echo "value=beta" >>"${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF}" == refs/tags/app/v* ]]; then
            echo "value=stable" >>"${GITHUB_OUTPUT}"
          else
            echo "value=develop" >>"${GITHUB_OUTPUT}"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            # Branch pushes
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=testing,enable=${{ github.ref == 'refs/heads/dev' }}
            # Beta release -> beta + version
            type=raw,value=beta,enable=${{ steps.version.outputs.is_release == 'true' && contains(github.ref, '-beta') }}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ steps.version.outputs.is_release == 'true' && contains(github.ref, '-beta') }}
            # Stable release -> latest + version
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release == 'true' && !contains(github.ref, '-beta') }}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ steps.version.outputs.is_release == 'true' && !contains(github.ref, '-beta') }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_CHANNEL=${{ steps.channel.outputs.value }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/${{ matrix.image }}:buildcache,mode=max
          sbom: true
          provenance: mode=max

      - name: Generate attestation
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
