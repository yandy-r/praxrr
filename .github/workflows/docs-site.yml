name: Docs Site

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'deno.json'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'deno.json'
  repository_dispatch:
    types:
      - praxrr-db-docs
      - praxrr-schema-docs
      - docs-rebuild
  workflow_dispatch:

concurrency:
  group: docs-site-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Praxrr
        uses: actions/checkout@v4

      - name: Checkout schema docs
        uses: actions/checkout@v4
        with:
          repository: yandy-r/praxrr-schema
          path: .external/praxrr-schema
          token: ${{ secrets.MIRROR_PAT || github.token }}
          sparse-checkout: |
            README.md
            docs
            pcd.json

      - name: Checkout database docs
        uses: actions/checkout@v4
        with:
          repository: yandy-r/praxrr-db
          path: .external/praxrr-db
          token: ${{ secrets.MIRROR_PAT || github.token }}
          sparse-checkout: |
            README.md
            docs
            pcd.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Import mirror docs
        working-directory: docs/site
        run: >
          npm run sync:external-docs --
          --schema-source=../../.external/praxrr-schema
          --db-source=../../.external/praxrr-db

      - name: Prepare monorepo TypeScript fallback
        run: |
          mkdir -p dist/.svelte-kit
          printf '{"compilerOptions":{}}\n' > dist/.svelte-kit/tsconfig.json

      - name: Build docs site
        working-directory: docs/site
        env:
          PRAXRR_SCHEMA_DOCS_SOURCE: ../../.external/praxrr-schema
          PRAXRR_DB_DOCS_SOURCE: ../../.external/praxrr-db
        run: npm run build

      - name: Verify versioned output
        working-directory: docs/site
        run: |
          set -euo pipefail
          total=$(find dist -name '*.html' | wc -l)
          next=$(find dist/next -name '*.html' | wc -l)
          default=$(( total - next ))
          echo "html pages -> total:$total default:$default next:$next"
          # Conservative floors + symmetry (both versions render identical pre-v2 content).
          test "$total" -ge 180
          test "$default" -ge 90
          test "$next" -ge 90
          diff=$(( default - next )); test "${diff#-}" -le 5
          # Required structure: default at root, next under /next/, per-version search + manifest.
          test -f dist/index.html
          test -f dist/next/index.html
          test -d dist/pagefind
          test -d dist/next/pagefind
          test -f dist/versions.json
          # Version selector rendered with the correct selected option per version (criterion #7).
          grep -q '<option value="/" selected' dist/getting-started/index.html
          grep -q '<option value="/next/" selected' dist/next/getting-started/index.html

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxrr-docs-site
          path: docs/site/dist
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'repository_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout Praxrr
        uses: actions/checkout@v4

      - name: Download static site artifact
        uses: actions/download-artifact@v4
        with:
          name: praxrr-docs-site
          path: docs/site/dist

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx --yes wrangler@latest deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
