name: Docs Site

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'deno.json'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'deno.json'
  repository_dispatch:
    types:
      - praxrr-db-docs
      - praxrr-schema-docs
      - docs-rebuild
  workflow_dispatch:

concurrency:
  group: docs-site-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Praxrr
        uses: actions/checkout@v4

      - name: Checkout schema docs
        uses: actions/checkout@v4
        with:
          repository: yandy-r/praxrr-schema
          path: .external/praxrr-schema
          sparse-checkout: |
            README.md
            docs
            pcd.json

      - name: Checkout database docs
        uses: actions/checkout@v4
        with:
          repository: yandy-r/praxrr-db
          path: .external/praxrr-db
          sparse-checkout: |
            README.md
            docs
            pcd.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Import mirror docs
        working-directory: docs/site
        run: >
          npm run sync:external-docs --
          --schema-source=../../.external/praxrr-schema
          --db-source=../../.external/praxrr-db

      - name: Build docs site
        working-directory: docs/site
        env:
          PRAXRR_SCHEMA_DOCS_SOURCE: ../../.external/praxrr-schema
          PRAXRR_DB_DOCS_SOURCE: ../../.external/praxrr-db
        run: npm run build

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxrr-docs-site
          path: docs/site/dist
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'repository_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'praxrr-docs' }}
    steps:
      - name: Download static site artifact
        uses: actions/download-artifact@v4
        with:
          name: praxrr-docs-site
          path: docs/site/dist

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: >
          npx --yes wrangler@latest pages deploy docs/site/dist
          --project-name "$CLOUDFLARE_PAGES_PROJECT"
          --branch "${GITHUB_REF_NAME:-main}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
