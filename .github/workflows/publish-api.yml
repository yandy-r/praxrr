name: Publish API Spec

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*.*'
      - '!v*-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.5.6'

      - name: Bundle API spec
        run: deno run -A scripts/bundle-api.ts

      - name: Verify generated files are the only changes
        run: |
          set -euo pipefail

          status_output="$(git status --porcelain)"
          if [ -z "$status_output" ]; then
            echo "Working tree is clean after bundling."
            exit 0
          fi

          unexpected_changes="$(
            printf '%s\n' "$status_output" \
              | sed 's/^...//' \
              | grep -Ev '^packages/profilarr-api/(openapi\.json|types\.ts)$' || true
          )"

          if [ -n "$unexpected_changes" ]; then
            echo "Unexpected changes found after API bundling:"
            printf '%s\n' "$unexpected_changes"
            echo
            git status --short
            exit 1
          fi

          echo "Only expected generated API files changed."

      - name: Dry run publish to JSR
        working-directory: packages/profilarr-api
        run: npx jsr publish --dry-run --allow-dirty

      - name: Publish to JSR
        working-directory: packages/profilarr-api
        run: npx jsr publish --allow-dirty
