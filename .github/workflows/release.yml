name: Release

on:
  push:
    tags:
      - 'app/v*'

env:
  DENO_VERSION: '2.5.6'
  DOTNET_VERSION: '8.0.x'
  PARSER_PROJECT_DIR: 'packages/praxrr-parser'

jobs:
  compatibility-gate:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/app/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Run compatibility check
        run: deno task compat:check

  build:
    needs: compatibility-gate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/app/v')
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - platform: linux-x64
            deno_target: x86_64-unknown-linux-gnu
            dotnet_rid: linux-x64
            vite_platform: linux-amd64
            archive_ext: tar.gz
            binary_ext: ''
          - platform: linux-arm64
            deno_target: aarch64-unknown-linux-gnu
            dotnet_rid: linux-arm64
            vite_platform: linux-arm64
            archive_ext: tar.gz
            binary_ext: ''
          - platform: macos-x64
            deno_target: x86_64-apple-darwin
            dotnet_rid: osx-x64
            vite_platform: macos-amd64
            archive_ext: tar.gz
            binary_ext: ''
          - platform: macos-arm64
            deno_target: aarch64-apple-darwin
            dotnet_rid: osx-arm64
            vite_platform: macos-arm64
            archive_ext: tar.gz
            binary_ext: ''
          - platform: windows-x64
            deno_target: x86_64-pc-windows-msvc
            dotnet_rid: win-x64
            vite_platform: windows-amd64
            archive_ext: zip
            binary_ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#app/v}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build SvelteKit
        run: cd packages/praxrr-app && deno run -A npm:vite build
        env:
          APP_BASE_PATH: ${{ github.workspace }}/dist/build
          VITE_PLATFORM: ${{ matrix.vite_platform }}
          VITE_CHANNEL: stable

      - name: Compile Deno binary
        run: |
          mkdir -p dist/staging
          deno compile \
            --no-check \
            --allow-net --allow-read --allow-write \
            --allow-env --allow-ffi --allow-run --allow-sys \
            --target ${{ matrix.deno_target }} \
            --output dist/staging/praxrr${{ matrix.binary_ext }} \
            dist/build/mod.ts
          cp dist/build/server.js dist/staging/server.js
          cp -r dist/build/static dist/staging/static

      - name: Build parser
        run: |
          rm -f "${PARSER_PROJECT_DIR}/Directory.Build.props"
          dotnet publish "${PARSER_PROJECT_DIR}/Parser.csproj" \
            -c Release \
            -r ${{ matrix.dotnet_rid }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o dist/parser-out

      - name: Stage parser binary
        run: |
          cp dist/parser-out/Parser${{ matrix.binary_ext }} \
             dist/staging/praxrr-parser${{ matrix.binary_ext }}

      - name: Create archive
        run: |
          cd dist/staging
          ARCHIVE_NAME="praxrr-${{ steps.version.outputs.value }}-${{ matrix.platform }}"
          if [ "${{ matrix.archive_ext }}" = "tar.gz" ]; then
            tar -czf "../${ARCHIVE_NAME}.tar.gz" *
          else
            zip "../${ARCHIVE_NAME}.zip" *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxrr-${{ matrix.platform }}
          path: dist/praxrr-*.${{ matrix.archive_ext }}

  release:
    needs: [build, compatibility-gate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/app/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Normalize release version
        id: release-version
        run: |
          VERSION="${GITHUB_REF_NAME#app/v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release-version.outputs.value }}
          generate_release_notes: true
          files: artifacts/*
          draft: false
          prerelease: false
