<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="piGrad" x1="100" y1="120" x2="412" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="280" y1="200" x2="440" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)"/>

  <!-- Stylized Pi (Π) form — the two vertical legs represent the double R -->
  <!-- Horizontal beam -->
  <rect x="88" y="128" width="280" height="40" rx="8" fill="url(#piGrad)"/>

  <!-- Left leg (first R) -->
  <rect x="120" y="128" width="40" height="260" rx="8" fill="url(#piGrad)"/>

  <!-- Right leg (second R) — slightly shorter, creating visual rhythm -->
  <rect x="248" y="128" width="40" height="220" rx="8" fill="url(#piGrad)"/>

  <!-- Forward arrow / chevron integrated with right leg — represents sync/flow -->
  <path d="M 310 240 L 400 300 L 310 360" stroke="url(#arrowGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small sync dots at the base of each leg — represents connected Arr instances -->
  <circle cx="140" cy="408" r="16" fill="#22D3EE"/>
  <circle cx="268" cy="368" r="16" fill="#818CF8"/>

  <!-- Subtle horizontal line connecting to arrow — the "pipeline" -->
  <line x1="288" y1="300" x2="310" y2="300" stroke="url(#arrowGrad)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>
