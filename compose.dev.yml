# Development compose - builds from source
# Usage:
#   docker compose -f compose.dev.yml --profile dev up --build --watch
#   docker compose -f compose.dev.yml --profile arr up -d lidarr radarr sonarr

services:
  praxrr:
    profiles: ['dev']
    container_name: praxrr-dev
    hostname: praxrr-dev
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '6969:6868'
    volumes:
      - ./config:/config
      - ./packages/praxrr-db:/praxrr-db # Optional: bind mount for local db development
      - ./packages/praxrr-schema:/schema # Optional: bind mount for local schema development
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=022
      - TZ=Etc/UTC
      # - PORT=6868
      # - HOST=0.0.0.0
      - PARSER_HOST=parser-dev
      - PARSER_PORT=5000
      - AUTH=off
      - E2E_USERNAME=${E2E_USERNAME:-praxrr-e2e}
      - E2E_PASSWORD=${E2E_PASSWORD:-praxrr123}
      - PRAXRR_DEFAULT_DB_URL=/praxrr-db # Optional: can be set to a local path or remote URL
      - PRAXRR_DEFAULT_DB_BRANCH=${PRAXRR_DEFAULT_DB_BRANCH:-main}
      - PRAXRR_DEFAULT_DB_NAME=Praxrr-db
      - PRAXRR_DEFAULT_DB_TOKEN=${PRAXRR_DEFAULT_DB_TOKEN}
      - PRAXRR_DEFAULT_DB_GIT_USERNAME=${PRAXRR_DEFAULT_DB_GIT_USERNAME}
      - PRAXRR_DEFAULT_DB_GIT_EMAIL=${PRAXRR_DEFAULT_DB_GIT_EMAIL}
      - PRAXRR_SCHEMA_LOCAL_PATH=/schema # Optional: can be set to a local path or remote URL
      - PRAXRR_SCHEMA_REF=main
      - ARR_CREDENTIAL_MASTER_KEY=${ARR_CREDENTIAL_MASTER_KEY}
      - ARR_CREDENTIAL_MASTER_KEY_VERSION=v1
      # ARR_CREDENTIAL_PREVIOUS_KEYS: ${ARR_CREDENTIAL_PREVIOUS_KEYS} # optional: JSON map
      # Optional Arr instances via environment at startup
      - LIDARR_INSTANCE_NAME_1=Lidarr # Optional (Generated if not provided)
      - LIDARR_INSTANCE_URL_1=http://praxrr-lidarr:8686
      # - LIDARR_INSTANCE_EXTERNAL_URL_1=${PRAXRR_LIDARR_EXTERNAL_URL} # Optional
      - LIDARR_INSTANCE_API_KEY_1=${PRAXRR_LIDARR_API_KEY}
      - LIDARR_INSTANCE_TAGS_1=music,flac,lossless
      - RADARR_INSTANCE_NAME_1=Radarr # Optional (Generated if not provided)
      - RADARR_INSTANCE_URL_1=http://praxrr-radarr:7878
      # - RADARR_INSTANCE_EXTERNAL_URL_1=${PRAXRR_RADARR_EXTERNAL_URL} # Optional
      - RADARR_INSTANCE_API_KEY_1=${PRAXRR_RADARR_API_KEY}
      - RADARR_INSTANCE_TAGS_1=movies,4k
      - SONARR_INSTANCE_NAME_1=Sonarr # Optional (Generated if not provided)
      - SONARR_INSTANCE_URL_1=http://praxrr-sonarr:8989
      # - SONARR_INSTANCE_EXTERNAL_URL_1=${PRAXRR_SONARR_EXTERNAL_URL} # Optional
      - SONARR_INSTANCE_API_KEY_1=${PRAXRR_SONARR_API_KEY}
      - SONARR_INSTANCE_TAGS_1=tv,4k
      - PRAXRR_VALIDATE_INSTANCES=false
      # Optional: pull sync selections from Arr instances on startup
      - PULL_ON_START=true
      - PULL_ON_START_MAX_CONCURRENCY=2
      - PULL_ON_START_TIMEOUT_MS=30000
    depends_on:
      parser:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./packages/praxrr-app/src
          ignore:
            - node_modules
            - dist
            - dist/**
            - .svelte-kit
            - .svelte-kit/**
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
            - ./**/*.md
        - action: rebuild
          path: ./packages/praxrr-app/svelte.config.js
        - action: rebuild
          path: ./packages/praxrr-app/vite.config.ts
        - action: rebuild
          path: ./packages/praxrr-app/package.json
        - action: rebuild
          path: ./packages/praxrr-app/deno.json
        - action: rebuild
          path: ./packages/praxrr-db
          ignore:
            - node_modules
            - dist
            - ./**/*.md
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
        - action: rebuild
          path: ./packages/praxrr-schema
          ignore:
            - node_modules
            - dist
            - ./**/*.md
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
        - action: rebuild
          path: ./deno.json
        - action: rebuild
          path: ./Dockerfile
        - action: restart
          path: ./compose.dev.yml

  parser:
    profiles: ['dev']
    container_name: parser-dev
    hostname: parser-dev
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.parser
    expose:
      - '5000'
    develop:
      watch:
        - action: rebuild
          path: ./packages/praxrr-parser
          ignore:
            - node_modules
            - dist
            - ./**/*.md
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
        - action: rebuild
          path: ./Dockerfile.parser

  radarr:
    profiles: ['arr']
    container_name: praxrr-radarr
    hostname: praxrr-radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    ports:
      - 17878:7878
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/radarr:/config
      - ./.arr/radarr/data:/data

  sonarr:
    profiles: ['arr']
    container_name: praxrr-sonarr
    hostname: praxrr-sonarr
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    ports:
      - 18989:8989
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/sonarr:/config
      - ./.arr/sonarr/data:/data

  lidarr:
    profiles: ['arr']
    container_name: praxrr-lidarr
    hostname: praxrr-lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    ports:
      - 18686:8686
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/lidarr:/config
      - ./.arr/lidarr/data:/data
