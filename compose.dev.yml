# Development compose - builds from source
# Usage:
#   Dev + Tailscale (no host ports):
#     docker compose -f compose.dev.yml --profile dev up --build --watch
#   Arr + Tailscale:
#     docker compose -f compose.dev.yml --profile arr up -d
#   Full stack:
#     docker compose -f compose.dev.yml --profile dev --profile arr up --build --watch

services:
  tsdproxy:
    profiles: ['dev', 'arr']
    container_name: praxrr-tsdproxy
    hostname: praxrr-tsdproxy
    image: almeidapaulopt/tsdproxy:2
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.tsdproxy/data:/data
      - ./.tsdproxy/config:/config
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    labels:
      tsdproxy.enable: 'true'
      tsdproxy.name: 'praxrr-tsdproxy'
      tsdproxy.dash.visible: 'false'
      tsdproxy.port.1: '443/https:8080/http'

  praxrr:
    profiles: ['dev']
    container_name: praxrr-dev
    hostname: praxrr-dev
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '6868'
    labels:
      tsdproxy.enable: 'true'
      tsdproxy.name: 'praxrr-dev'
      tsdproxy.port.1: '443/https:6868/http'
      tsdproxy.dash.label: 'Praxrr Dev'
    volumes:
      - ./config:/config
      - ./packages/praxrr-db:/praxrr-db # Optional: bind mount for local db development
      - ./packages/praxrr-schema:/schema # Optional: bind mount for local schema development
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=022
      - TZ=Etc/UTC
      # - PORT=6868
      # - HOST=0.0.0.0
      - PARSER_HOST=parser-dev
      - PARSER_PORT=5000
      - AUTH=off
      - E2E_USERNAME=${E2E_USERNAME:-praxrr-e2e}
      - E2E_PASSWORD=${E2E_PASSWORD:-praxrr123}
      - PRAXRR_DEFAULT_DB_URL=/praxrr-db # Optional: can be set to a local path or remote URL
      - PRAXRR_DEFAULT_DB_BRANCH=${PRAXRR_DEFAULT_DB_BRANCH:-main}
      - PRAXRR_DEFAULT_DB_NAME=Praxrr-db
      - PRAXRR_DEFAULT_DB_TOKEN=${PRAXRR_DEFAULT_DB_TOKEN}
      - PRAXRR_DEFAULT_DB_GIT_USERNAME=${PRAXRR_DEFAULT_DB_GIT_USERNAME}
      - PRAXRR_DEFAULT_DB_GIT_EMAIL=${PRAXRR_DEFAULT_DB_GIT_EMAIL}
      - PRAXRR_SCHEMA_LOCAL_PATH=/schema # Optional: can be set to a local path or remote URL
      - PRAXRR_SCHEMA_REF=main
      - ARR_CREDENTIAL_MASTER_KEY=${ARR_CREDENTIAL_MASTER_KEY}
      - ARR_CREDENTIAL_MASTER_KEY_VERSION=v1
      # ARR_CREDENTIAL_PREVIOUS_KEYS: ${ARR_CREDENTIAL_PREVIOUS_KEYS} # optional: JSON map
      # Optional Arr instances via environment at startup
      - LIDARR_INSTANCE_NAME_1=Lidarr # Optional (Generated if not provided)
      - LIDARR_INSTANCE_URL_1=http://praxrr-lidarr:8686
      - LIDARR_INSTANCE_EXTERNAL_URL_1=${LIDARR_INSTANCE_EXTERNAL_URL_1}
      - LIDARR_INSTANCE_API_KEY_1=${LIDARR_INSTANCE_API_KEY_1}
      - LIDARR_INSTANCE_TAGS_1=music,flac,lossless
      - RADARR_INSTANCE_NAME_1=Radarr # Optional (Generated if not provided)
      - RADARR_INSTANCE_URL_1=http://praxrr-radarr:7878
      - RADARR_INSTANCE_EXTERNAL_URL_1=${RADARR_INSTANCE_EXTERNAL_URL_1}
      - RADARR_INSTANCE_API_KEY_1=${RADARR_INSTANCE_API_KEY_1}
      - RADARR_INSTANCE_TAGS_1=movies,4k
      - SONARR_INSTANCE_NAME_1=Sonarr # Optional (Generated if not provided)
      - SONARR_INSTANCE_URL_1=http://praxrr-sonarr:8989
      - SONARR_INSTANCE_EXTERNAL_URL_1=${SONARR_INSTANCE_EXTERNAL_URL_1}
      - SONARR_INSTANCE_API_KEY_1=${SONARR_INSTANCE_API_KEY_1}
      - SONARR_INSTANCE_TAGS_1=tv,4k
      - PRAXRR_VALIDATE_INSTANCES=false
      # Optional: pull sync selections from Arr instances on startup
      - PULL_ON_START=true
      - PULL_ON_START_MAX_CONCURRENCY=2
      - PULL_ON_START_TIMEOUT_MS=30000
    depends_on:
      parser:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./packages/praxrr-app/src
          ignore:
            - node_modules
            - dist
            - dist/**
            - .svelte-kit
            - .svelte-kit/**
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
            - ./**/*.md
        - action: rebuild
          path: ./packages/praxrr-app/svelte.config.js
        - action: rebuild
          path: ./packages/praxrr-app/vite.config.ts
        - action: rebuild
          path: ./packages/praxrr-app/package.json
        - action: rebuild
          path: ./packages/praxrr-app/deno.json
        - action: rebuild
          path: ./packages/praxrr-db
          ignore:
            - node_modules
            - dist
            - ./**/*.md
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
        - action: rebuild
          path: ./packages/praxrr-schema
          ignore:
            - node_modules
            - dist
            - ./**/*.md
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
        - action: rebuild
          path: ./deno.json
        - action: rebuild
          path: ./Dockerfile
        - action: restart
          path: ./compose.dev.yml

  parser:
    profiles: ['dev']
    container_name: parser-dev
    hostname: parser-dev
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.parser
    expose:
      - '5000'
    develop:
      watch:
        - action: rebuild
          path: ./packages/praxrr-parser
          ignore:
            - node_modules
            - dist
            - ./**/*.md
            - .github/**
            - .vscode/**
            - .dockerignore
            - .gitignore
            - .prettierignore
            - .eslintignore
        - action: rebuild
          path: ./Dockerfile.parser

  radarr:
    profiles: ['arr']
    container_name: praxrr-radarr
    hostname: praxrr-radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    expose:
      - '7878'
    labels:
      tsdproxy.enable: 'true'
      tsdproxy.name: 'praxrr-radarr'
      tsdproxy.port.1: '443/https:7878/http'
      tsdproxy.dash.label: 'Radarr'
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/radarr:/config
      - ./.arr/radarr/data:/data

  sonarr:
    profiles: ['arr']
    container_name: praxrr-sonarr
    hostname: praxrr-sonarr
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    expose:
      - '8989'
    labels:
      tsdproxy.enable: 'true'
      tsdproxy.name: 'praxrr-sonarr'
      tsdproxy.port.1: '443/https:8989/http'
      tsdproxy.dash.label: 'Sonarr'
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/sonarr:/config
      - ./.arr/sonarr/data:/data

  lidarr:
    profiles: ['arr']
    container_name: praxrr-lidarr
    hostname: praxrr-lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    expose:
      - '8686'
    labels:
      tsdproxy.enable: 'true'
      tsdproxy.name: 'praxrr-lidarr'
      tsdproxy.port.1: '443/https:8686/http'
      tsdproxy.dash.label: 'Lidarr'
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/lidarr:/config
      - ./.arr/lidarr/data:/data
