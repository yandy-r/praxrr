# Development compose - builds from source
# Usage: docker compose -f compose.dev.yml up --build

services:
  praxrr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: praxrr-dev
    ports:
      - '6969:6868'
    volumes:
      - ./config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=022
      - TZ=Etc/UTC
      # - PORT=6868
      # - HOST=0.0.0.0
      - PARSER_HOST=parser
      - PARSER_PORT=5000
      # - AUTH=off
      - PRAXRR_DEFAULT_DB_URL=https://github.com/${PRAXRR_DEFAULT_DB_GIT_USERNAME}/praxrr-db
      - PRAXRR_DEFAULT_DB_BRANCH=dev
      - PRAXRR_DEFAULT_DB_NAME=Praxrr-db
      - PRAXRR_DEFAULT_DB_TOKEN=${PRAXRR_DEFAULT_DB_TOKEN}
      - PRAXRR_DEFAULT_DB_GIT_USERNAME=${PRAXRR_DEFAULT_DB_GIT_USERNAME}
      - PRAXRR_DEFAULT_DB_GIT_EMAIL=${PRAXRR_DEFAULT_DB_GIT_EMAIL}
      - PRAXRR_SCHEMA_REF=dev
    depends_on:
      parser:
        condition: service_healthy

  parser:
    build:
      context: .
      dockerfile: Dockerfile.parser
    container_name: praxrr-parser-dev
    expose:
      - '5000'
