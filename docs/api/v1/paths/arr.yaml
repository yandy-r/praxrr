library:
  get:
    operationId: getLibrary
    summary: Get Arr instance library
    description: |
      Fetches the full library from an Arr instance with quality profile,
      score, and progress information.

      - For Radarr: Returns movies with file quality, custom format scores, and cutoff progress
      - For Sonarr: Returns series with season summaries and episode statistics
      - For Lidarr: Returns artists/albums (capability-gated; detailed payload fields deferred to later phases)

      Results include Profilarr profile matching to indicate which items use managed profiles.
      Responses are cached server-side for 5 minutes.
      Supports server-side filtering, sorting, and pagination.
    tags:
      - Arr
    parameters:
      - name: instanceId
        in: query
        required: true
        schema:
          type: integer
        description: Arr instance ID
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Pagination page number (1-based)
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 250
          default: 100
        description: |
          Maximum number of items per page. Values above 250 are capped at 250.
      - name: sortKey
        in: query
        required: false
        schema:
          type: string
        description: |
          Optional sort field. Must be valid for the target Arr type
          (radarr, sonarr, or lidarr) or request will be rejected.
      - name: sortDirection
        in: query
        required: false
        schema:
          type: string
          enum:
            - asc
            - desc
          default: asc
        description: Sort order for the sortKey field.
      - name: query
        in: query
        required: false
        schema:
          type: string
        description: Optional case-insensitive text filter applied before sorting and pagination.
    responses:
      '200':
        description: Library items with quality and score data
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/LibraryResponse'
      '400':
        description: Invalid instanceId, page, or sort/query parameters
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to fetch library
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
  delete:
    operationId: invalidateLibraryCache
    summary: Invalidate library cache
    description: |
      Clears the server-side cache for an Arr instance's library data.
      The next GET request will fetch fresh data from the Arr instance.
    tags:
      - Arr
    parameters:
      - name: instanceId
        in: query
        required: true
        schema:
          type: integer
        description: Arr instance ID
    responses:
      '200':
        description: Cache invalidated
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/CacheInvalidatedResponse'
      '400':
        description: Invalid or missing instanceId
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

episodes:
  get:
    operationId: getLibraryEpisodes
    summary: Get episode details for a Sonarr series
    description: |
      Lazy-loads episode-level data for a specific series in a Sonarr instance.
      Returns episodes with quality, custom format scores, and cutoff progress.

      This endpoint is designed for on-demand loading when a series row is expanded
      in the library view. Sonarr instances only.

      Results are cached server-side for 5 minutes per series.
    tags:
      - Arr
    parameters:
      - name: instanceId
        in: query
        required: true
        schema:
          type: integer
        description: Arr instance ID (must be a Sonarr instance)
      - name: seriesId
        in: query
        required: true
        schema:
          type: integer
        description: Sonarr series ID
    responses:
      '200':
        description: Episode details with quality and score data
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/EpisodesResponse'
      '400':
        description: Invalid parameters or not a Sonarr instance
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to fetch episode details
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

releases:
  get:
    operationId: getReleases
    summary: Search for releases
    description: |
      Triggers an interactive search on an Arr instance and returns grouped/deduplicated results.

      For Radarr: Searches for releases for the specified movie.
      For Sonarr: Searches for season pack releases for the specified series and season.
      For Lidarr: Searches for releases for the specified album.

      Results are grouped by title, combining information from multiple indexers.
    tags:
      - Arr
    parameters:
      - name: instanceId
        in: query
        required: true
        schema:
          type: integer
        description: Arr instance ID
      - name: itemId
        in: query
        required: true
        schema:
          type: integer
        description: Movie ID (Radarr), Series ID (Sonarr), or Album ID (Lidarr)
      - name: season
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: Season number for Sonarr searches (defaults to 1)
    responses:
      '200':
        description: Release search results
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ReleasesResponse'
      '400':
        description: Invalid or missing parameters
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to fetch releases
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

cleanup:
  post:
    operationId: arrCleanup
    summary: Scan or execute cleanup of stale configs
    description: |
      Detects and deletes stale namespace-suffixed custom formats and quality profiles
      from an Arr instance that are no longer in the current sync selections.

      Two actions are supported via the `action` field in the request body:
      - `scan`: Scans for stale items and returns what would be deleted.
      - `execute`: Deletes the stale items from a previous scan result.

      Quality profiles assigned to media will be skipped with a warning (Arr returns HTTP 500 "in use").
    tags:
      - Arr
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '../schemas/arr.yaml#/CleanupScanRequest'
              - $ref: '../schemas/arr.yaml#/CleanupExecuteRequest'
    responses:
      '200':
        description: Scan or delete result
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../schemas/arr.yaml#/CleanupScanResult'
                - $ref: '../schemas/arr.yaml#/CleanupDeleteResult'
      '400':
        description: Invalid request (missing instanceId, invalid action)
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to perform cleanup
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
