preview:
  post:
    operationId: createSyncPreview
    summary: Generate a sync preview
    description: |
      Computes a read-only preview of the sync changes for an Arr instance.

      This endpoint performs no writes. It only reads from PCD and Arr GET
      endpoints to compare desired versus current state, then stores a preview
      snapshot for later retrieval or application.

      If no `sections` are provided, all configured sections for the instance are
      included.
    tags:
      - Arr
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/sync.yaml#/SyncPreviewCreateRequest'
    responses:
      '200':
        description: Preview generated
        content:
          application/json:
            schema:
              $ref: '../schemas/sync.yaml#/SyncPreviewResult'
      '400':
        description: Invalid instanceId, unsupported section, or request body
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '409':
        description: Preview for this instance is already generating
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '429':
        description: Preview creation is rate-limited or preview-store capacity is exhausted
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: |
          Preview generation failed. The failed preview snapshot is returned with
          `status: failed` and a typed, safe `failure` reason — no raw exception text.
        content:
          application/json:
            schema:
              $ref: '../schemas/sync.yaml#/SyncPreviewResult'

previewById:
  get:
    operationId: getSyncPreview
    summary: Get a sync preview
    description: |
      Retrieves a previously generated preview snapshot by ID.

      This endpoint is read-only and is safe to call repeatedly while preview state
      changes naturally over time.

      Snapshots are subject to staleness rules enforced by the preview TTL. A
      preview that has exceeded the TTL should be treated as expired.
    tags:
      - Arr
    parameters:
      - name: previewId
        in: path
        required: true
        description: Preview snapshot ID
        schema:
          type: string
    responses:
      '200':
        description: Sync preview
        content:
          application/json:
            schema:
              $ref: '../schemas/sync.yaml#/SyncPreviewResult'
      '404':
        description: Preview not found or expired
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to fetch preview
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
  delete:
    operationId: deleteSyncPreview
    summary: Discard a sync preview
    description: |
      Removes a stored preview snapshot.

      This endpoint does not trigger any Arr sync action; it only removes the cached
      preview and does not change runtime configuration.
    tags:
      - Arr
    parameters:
      - name: previewId
        in: path
        required: true
        description: Preview snapshot ID
        schema:
          type: string
    responses:
      '204':
        description: Preview discarded
      '404':
        description: Preview not found or expired
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to delete preview
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

previewApply:
  post:
    operationId: applySyncPreview
    summary: Apply a sync preview
    description: |
      Applies the selected sections from a previously generated preview to the
      target Arr instance.

      Preview generation itself is read-only. Apply runs the normal sync job path
      afresh for the selected sections using the current saved sync configuration;
      it does not replay stored per-entity mutations from the preview snapshot.

      The response reports only the aggregate job/run result. Preview entity changes
      remain planned evidence and are not per-entity confirmation of what succeeded.

      Apply rejects previews that are too stale based on policy:
      - warnings are returned when the preview is older than 5 minutes
      - apply is blocked when staleness exceeds the hard threshold
    tags:
      - Arr
    parameters:
      - name: previewId
        in: path
        required: true
        description: Preview snapshot ID
        schema:
          type: string
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../schemas/sync.yaml#/SyncPreviewApplyRequest'
    responses:
      '200':
        description: Selected sections completed successfully or required no work
        content:
          application/json:
            schema:
              $ref: '../schemas/sync.yaml#/SyncPreviewApplyResponse'
      '400':
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Preview not found or expired
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '409':
        description: Preview is not in a ready state, contains failed sections, or instance is syncing
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '422':
        description: Preview is stale beyond apply threshold
        content:
          application/json:
            schema:
              $ref: '../schemas/sync.yaml#/SyncPreviewApplyErrorResponse'
      '500':
        description: Sync job reported failure or preview apply raised an unexpected error
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../schemas/sync.yaml#/SyncPreviewApplyResponse'
                - $ref: '../schemas/sync.yaml#/SyncPreviewApplyErrorResponse'
