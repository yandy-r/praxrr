summary:
  get:
    operationId: getConfigHealthSummary
    summary: Fleet config-health summary
    description: |
      Live per-instance overall health score and band for every enabled, sync-capable Arr instance,
      plus aggregate totals and a settings snapshot. Degraded/never-checked states are carried in the
      200 body (per-instance band), not as an HTTP error.
    tags:
      - Config Health
    responses:
      '200':
        description: Fleet health summary
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthSummaryResponse'
      '500':
        description: Internal error
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

detail:
  get:
    operationId: getConfigHealthDetail
    summary: Config-health detail for one instance
    description: |
      Live overall health plus a per-quality-profile breakdown with per-criterion contributions and
      non-judgmental suggestions for a single instance.
    tags:
      - Config Health
    parameters:
      - name: instanceId
        in: path
        required: true
        description: Arr instance id
        schema:
          type: integer
    responses:
      '200':
        description: Instance health detail
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthDetailResponse'
      '400':
        description: Invalid instance id
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found or not sync-capable
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

recompute:
  post:
    operationId: recomputeConfigHealth
    summary: Recompute config-health for one instance on demand
    description: |
      Recomputes and persists current config health for a single instance on the request thread (not
      the scheduled sweep), then returns the fresh detail. Reuses the same scoring + snapshot service
      as the scheduled computation, so the response schema and engine version match exactly.
      Rate-limited and in-flight-bounded per instance. Scoring performs no live Arr I/O, so a
      degraded/unreachable instance still returns 200 with an `unknown` band.
    tags:
      - Config Health
    parameters:
      - name: instanceId
        in: path
        required: true
        description: Arr instance id
        schema:
          type: integer
    responses:
      '200':
        description: Recomputed instance health detail
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthDetailResponse'
      '400':
        description: Invalid instance id or the instance is disabled
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found or not sync-capable
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '409':
        description: A config-health recompute for this instance is already in progress
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '429':
        description: On-demand config-health recompute is rate-limited for this instance
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to recompute config health
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

trends:
  get:
    operationId: getConfigHealthTrends
    summary: Read config-health history for one instance
    description: |
      Returns one canonical, bounded historical result from persisted config-health snapshots for an
      active sync-capable instance. Overall scope includes persisted criterion observations; exact
      profile scope includes only the profile score and band recorded in each snapshot.

      Filters are inclusive. `days` is mutually exclusive with `from` and `to`, and is normalized to
      absolute UTC bounds in the response. Points are ordered by `generatedAt ASC, snapshotId ASC`.
      Unknown, absent, or unrecorded evidence is represented by explicit states and nullable values,
      never recomputed or silently truncated. A valid selection with no points returns 200.
    tags:
      - Config Health
    parameters:
      - name: instanceId
        in: path
        required: true
        description: Arr instance id
        schema:
          type: integer
      - name: days
        in: query
        required: false
        description: Relative UTC window in days. Cannot be combined with `from` or `to`.
        schema:
          type: integer
          minimum: 1
          maximum: 3650
      - name: from
        in: query
        required: false
        description: Inclusive date-only or ISO-8601 date-time lower bound.
        schema:
          oneOf:
            - type: string
              format: date
            - type: string
              format: date-time
      - name: to
        in: query
        required: false
        description: Inclusive date-only or ISO-8601 date-time upper bound.
        schema:
          oneOf:
            - type: string
              format: date
            - type: string
              format: date-time
      - name: profile
        in: query
        required: false
        description: Exact non-empty persisted profile name. Matching does not trim or case-fold.
        schema:
          type: string
          minLength: 1
    responses:
      '200':
        description: Canonical health history, including an empty `points` array when nothing matches
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthTrendsResponse'
      '400':
        description: Invalid instance id, filter, filter combination, or range
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found or not sync-capable
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '422':
        description: |
          Exact selection exceeds the 10,000-point limit, or selected/retained-profile evidence
          exceeds the safe per-row, aggregate-byte, or nested-item budget. No partial result is returned.
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to read config-health history
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

trendsExport:
  get:
    operationId: exportConfigHealthTrends
    summary: Export config-health history for one instance
    description: |
      Downloads the same canonical filtered result and point order as the trend endpoint. JSON uses
      the complete response envelope. CSV uses one row per canonical point and a fixed criteria JSON
      cell. A valid empty selection returns 200 with an empty JSON `points` array or a header-only CSV.

      The exact 10,000-point limit and stored-evidence budgets apply atomically to both formats;
      oversized selections are never silently truncated.
    tags:
      - Config Health
    parameters:
      - name: instanceId
        in: path
        required: true
        description: Arr instance id
        schema:
          type: integer
      - name: format
        in: query
        required: false
        description: Attachment representation. Defaults to the canonical JSON envelope.
        schema:
          type: string
          enum:
            - json
            - csv
          default: json
      - name: days
        in: query
        required: false
        description: Relative UTC window in days. Cannot be combined with `from` or `to`.
        schema:
          type: integer
          minimum: 1
          maximum: 3650
      - name: from
        in: query
        required: false
        description: Inclusive date-only or ISO-8601 date-time lower bound.
        schema:
          oneOf:
            - type: string
              format: date
            - type: string
              format: date-time
      - name: to
        in: query
        required: false
        description: Inclusive date-only or ISO-8601 date-time upper bound.
        schema:
          oneOf:
            - type: string
              format: date
            - type: string
              format: date-time
      - name: profile
        in: query
        required: false
        description: Exact non-empty persisted profile name. Matching does not trim or case-fold.
        schema:
          type: string
          minLength: 1
    responses:
      '200':
        description: JSON or CSV attachment, including successful empty selections
        headers:
          Content-Disposition:
            description: Fixed ASCII attachment filename derived from the numeric instance id and server time
            schema:
              type: string
          Cache-Control:
            description: Prevents storage of operational history downloads
            schema:
              type: string
              enum:
                - no-store
          X-Content-Type-Options:
            description: Prevents content-type sniffing
            schema:
              type: string
              enum:
                - nosniff
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthTrendsResponse'
          text/csv:
            schema:
              type: string
      '400':
        description: Invalid instance id, filter, filter combination, range, or format
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found or not sync-capable
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '422':
        description: |
          Exact selection exceeds the 10,000-point limit, or selected/retained-profile evidence
          exceeds the safe per-row, aggregate-byte, or nested-item budget. No partial attachment is returned.
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to export config-health history
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

settings:
  get:
    operationId: getConfigHealthSettings
    summary: Read config-health settings
    description: |
      The configurable per-criterion enable/weight set, cadence, retention, the engine version, and
      the static criterion catalog (id/label/description) so the client hardcodes nothing.
    tags:
      - Config Health
    responses:
      '200':
        description: Config-health settings
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthSettingsResponse'
  put:
    operationId: updateConfigHealthSettings
    summary: Update config-health settings
    description: |
      Update the criteria enable/weights, cadence, and retention. Reschedules the snapshot + cleanup
      jobs immediately. Returns 409 when `expectedEngineVersion` does not match the server engine.
    tags:
      - Config Health
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/config-health.yaml#/ConfigHealthSettingsUpdateRequest'
    responses:
      '200':
        description: Updated config-health settings
        content:
          application/json:
            schema:
              $ref: '../schemas/config-health.yaml#/ConfigHealthSettingsResponse'
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '409':
        description: Engine version mismatch
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
