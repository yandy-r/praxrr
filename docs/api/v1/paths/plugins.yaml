list:
  get:
    operationId: listPlugins
    summary: List durable plugin registry state
    description: |
      Returns redacted validated manifest metadata plus durable enablement/discovery state. When
      `PLUGINS_ENABLED` is off, returns 200 with `pluginsEnabled: false` and an empty `items` array;
      persisted state is not mutated. Local source directories and raw manifests are never exposed.
    tags:
      - Plugins
    responses:
      '200':
        description: Feature-aware plugin registry list
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginListResponse'
      '500':
        description: Failed to read durable plugin registry state
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'

detail:
  get:
    operationId: getPlugin
    summary: Read one API-version-qualified plugin
    description: |
      Looks up one durable plugin by exact API-version namespace and case-insensitive plugin id.
      Valid persisted identity values are not trimmed, and no API version is inferred.
    tags:
      - Plugins
    parameters:
      - name: apiVersion
        in: path
        required: true
        description: Exact non-empty plugin contract API-version namespace; no current version is inferred.
        schema:
          type: string
          minLength: 1
      - name: id
        in: path
        required: true
        description: Non-empty persisted plugin id; lookup is case-insensitive within the selected namespace.
        schema:
          type: string
          minLength: 1
    responses:
      '200':
        description: Redacted durable plugin state
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginDetailResponse'
      '400':
        description: Empty or otherwise invalid path identity
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '404':
        description: Plugin not found in the requested API-version namespace
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '409':
        description: Plugin management is disabled by `PLUGINS_ENABLED`
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '500':
        description: Failed to read durable plugin state
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'

enable:
  post:
    operationId: enablePlugin
    summary: Enable one durable plugin identity
    description: |
      Persists administrator enablement intent for one API-version-qualified plugin. This does not
      assert runtime activation or successful execution. Disabled feature state rejects without
      mutating durable state. Browser requests must be same-origin; authenticated non-browser
      clients may omit the `Origin` header.
    tags:
      - Plugins
    parameters:
      - name: apiVersion
        in: path
        required: true
        description: Exact non-empty plugin contract API-version namespace; no current version is inferred.
        schema:
          type: string
          minLength: 1
      - name: id
        in: path
        required: true
        description: Non-empty persisted plugin id; lookup is case-insensitive within the selected namespace.
        schema:
          type: string
          minLength: 1
    responses:
      '200':
        description: Plugin enablement intent persisted
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginMutationResponse'
      '400':
        description: Empty or otherwise invalid path identity
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '403':
        description: Cross-origin browser request rejected before mutation
      '404':
        description: Plugin not found in the requested API-version namespace
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '409':
        description: Plugin management is disabled or a registry reconciliation conflicts with this mutation
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '500':
        description: Failed to persist plugin enablement
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'

disable:
  post:
    operationId: disablePlugin
    summary: Disable one durable plugin identity
    description: |
      Persists administrator disablement intent for one API-version-qualified plugin. Missing plugins
      retain this decision for a later reappearance. Disabled feature state rejects without mutation.
      Browser requests must be same-origin; authenticated non-browser clients may omit the `Origin`
      header.
    tags:
      - Plugins
    parameters:
      - name: apiVersion
        in: path
        required: true
        description: Exact non-empty plugin contract API-version namespace; no current version is inferred.
        schema:
          type: string
          minLength: 1
      - name: id
        in: path
        required: true
        description: Non-empty persisted plugin id; lookup is case-insensitive within the selected namespace.
        schema:
          type: string
          minLength: 1
    responses:
      '200':
        description: Plugin disablement intent persisted
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginMutationResponse'
      '400':
        description: Empty or otherwise invalid path identity
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '403':
        description: Cross-origin browser request rejected before mutation
      '404':
        description: Plugin not found in the requested API-version namespace
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '409':
        description: Plugin management is disabled or a registry reconciliation conflicts with this mutation
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
      '500':
        description: Failed to persist plugin disablement
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'

reload:
  post:
    operationId: reloadPlugins
    summary: Rescan and atomically reconcile plugins
    description: |
      Runs the bounded plugin scan, validates complete candidates, reconciles durable state in one
      transaction, then atomically publishes the new registry snapshot. Concurrent reload callers
      share the serialized operation. When `PLUGINS_ENABLED` is off, returns a successful no-op summary
      with `reloaded: false`, zero counters, and no filesystem or database mutation. Browser requests
      must be same-origin; authenticated non-browser clients may omit the `Origin` header.
    tags:
      - Plugins
    responses:
      '200':
        description: Reload completed or feature-off no-op summary
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginReloadResponse'
      '403':
        description: Cross-origin browser request rejected before scan or mutation
      '500':
        description: Reload failed; the previous in-memory registry remains usable
        content:
          application/json:
            schema:
              $ref: '../schemas/plugins.yaml#/PluginErrorResponse'
