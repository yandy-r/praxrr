        secondaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileTypeToggle'
        releaseStatuses:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileReleaseStatusToggle'
      description: |
        Partial update payload for Lidarr metadata profile entities.

        Omitted fields are preserved by the write layer.
