openapi: 3.1.0
info:
  title: Praxrr API
  description: API for Praxrr - Profile management and sync for *arr applications
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: System
    description: System health and status endpoints
  - name: Entity Testing
    description: Release parsing and custom format evaluation
  - name: Score Simulator
    description: Interactive release scoring playground
  - name: Impact Simulator
    description: Configuration change impact simulation (scores, thresholds, cascade)
  - name: Arr
    description: Arr instance library and release endpoints
  - name: Trash Guide
    description: TRaSH Guide cached entity and source management
  - name: PCD
    description: PCD entity export and portable format endpoints
  - name: PCD Snapshots
    description: PCD state snapshot management endpoints
  - name: Resolved Config
    description: Resolved PCD configuration state, layer breakdown, and live/cross-instance diff endpoints
  - name: Dependency Graph
    description: Resolved dependency relationships between PCD config entities, with per-entity impact
  - name: User Preferences
    description: Durable UI preference storage for progressive disclosure
  - name: Complexity Tiers
    description: Per-section complexity tier storage for progressive complexity
  - name: Setup
    description: First-run setup wizard state and Arr connection testing
  - name: Compatibility
    description: Cross-Arr compatibility parity map and semantic difference catalog
  - name: Drift Detection
    description: Desired-vs-actual drift status per Arr instance, on-demand refresh, and settings
  - name: Sync History
    description: Append-only audit trail of Arr sync runs — search, detail, export, and retention
  - name: Quality Goals
    description: Intent-to-implementation bridge — translate presets/sliders into custom-format scores
  - name: Canary
    description: Staged rollout orchestration — canary sync, verification gate, and batched fan-out
  - name: Config Health
    description: Score configuration quality/health per instance and profile, with suggestions and trends
  - name: Security Posture
    description: Non-blocking security posture "Shield Check" — auth, transport, and credential exposure audit
  - name: Timeline
    description: Sync-archaeology timeline — merged read-only feed of syncs, snapshots, rollbacks, and canary rollouts, with annotations
  - name: WebAuthn
    description: Passkey / WebAuthn authentication — register credentials while logged in and sign in passwordlessly (supplements password auth under AUTH=on)

paths:
  /health:
    $ref: './paths/system.yaml#/health'
  /openapi.json:
    $ref: './paths/system.yaml#/openapi'
  /parser/health:
    $ref: './paths/system.yaml#/parser-health'
  /system/startup-pull/latest:
    $ref: './paths/system.yaml#/startup-pull-latest'
  /ui-preferences:
    get:
      operationId: getUiPreference
      summary: Read one UI preference
      description: |
        Returns the preferred disclosure mode for a section key.

        Missing persisted values are returned as default `basic` unless `strict`
        is enabled.
      tags:
        - User Preferences
      parameters:
        - name: section_key
          in: query
          required: true
          description: Canonical section key for progressive disclosure state
          schema:
            $ref: '#/components/schemas/UiSectionKey'
        - name: strict
          in: query
          required: false
          description: When true, missing rows return 404 instead of default response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: UI preference record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UiPreferenceRecord'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Preference not found for strict read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to read preference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
    patch:
      operationId: upsertUiPreference
      summary: Upsert one UI preference
      description: |
        Creates or updates the stored disclosure mode for a section key.

        Payloads include optional concurrency token `expected_updated_at`.
      tags:
        - User Preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UiPreferenceUpsertRequest'
      responses:
        '200':
          description: UI preference persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UiPreferenceRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '409':
          description: Concurrency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '429':
          description: Preference updates are being rate-limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to save preference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
  /complexity-tiers:
    get:
      operationId: getComplexityTier
      summary: Read one complexity tier
      description: |
        Returns the preferred complexity tier and progression counters for a
        section key.

        Missing persisted values are returned as default `beginner` unless
        `strict` is enabled.
      tags:
        - Complexity Tiers
      parameters:
        - name: section_key
          in: query
          required: true
          description: Canonical section key for progressive complexity state
          schema:
            $ref: '#/components/schemas/UiSectionKey'
        - name: strict
          in: query
          required: false
          description: When true, missing rows return 404 instead of default response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Complexity tier record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplexityTierRecord'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Complexity tier not found for strict read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to read complexity tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
    patch:
      operationId: upsertComplexityTier
      summary: Upsert one complexity tier
      description: |
        Creates or updates the stored complexity tier for a section key.

        Payloads include optional concurrency token `expected_updated_at`.
        Activity deltas are bounded and may be used to drive non-intrusive
        progression suggestions.
      tags:
        - Complexity Tiers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplexityTierUpsertRequest'
      responses:
        '200':
          description: Complexity tier persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplexityTierRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '409':
          description: Concurrency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '429':
          description: Complexity tier updates are being rate-limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to save complexity tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
