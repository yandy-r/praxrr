  /trash-guide/sources/{id}/entities/{trashId}:
    get:
      operationId: getTrashGuideSourceEntity
      summary: Get one TRaSH cached entity
      description: |
        Returns a single TRaSH entity from a synced source cache by trashId.
      tags:
        - Trash Guide
      parameters:
        - name: id
          in: path
          required: true
          description: TRaSH source ID
          schema:
            type: integer
        - name: trashId
          in: path
          required: true
          description: TRaSH entity ID (32 lowercase hex chars)
          schema:
            type: string
        - name: type
          in: query
          required: true
          description: TRaSH entity type
          schema:
            $ref: '#/components/schemas/TrashGuideEntityType'
      responses:
        '200':
          description: TRaSH cached entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashGuideEntityDetailResponse'
        '400':
          description: Missing or invalid source/id/type parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Source or TRaSH entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '422':
          description: Invalid entity type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to read TRaSH entity cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
