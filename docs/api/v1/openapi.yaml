      required:
        - name
      properties:
        layer:
          type: string
          enum:
            - user
            - base
          default: user
          description: Write target for the operation. Defaults to user.
        name:
          type: string
          minLength: 1
          description: |
            Current row name used by value guards for concurrency detection.
