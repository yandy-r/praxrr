          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileAlbumType'
        releaseStatuses:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileReleaseStatus'
    LidarrMetadataProfileListItem:
      type: object
      required:
        - id
        - name
        - description
        - updated_at
        - primaryTypeCount
        - secondaryTypeCount
        - releaseStatusCount
