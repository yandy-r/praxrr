openapi: 3.1.0
info:
  title: Praxrr API
  description: API for Praxrr - Profile management and sync for *arr applications
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: System
    description: System health and status endpoints
  - name: Entity Testing
    description: Release parsing and custom format evaluation
  - name: Arr
    description: Arr instance library and release endpoints
  - name: PCD
    description: PCD entity export and portable format endpoints

paths:
  /health:
    $ref: './paths/system.yaml#/health'
  /openapi.json:
    $ref: './paths/system.yaml#/openapi'
  /system/startup-pull/latest:
    $ref: './paths/system.yaml#/startup-pull-latest'
  /entity-testing/evaluate:
    $ref: './paths/entity-testing.yaml#/evaluate'
  /arr/library:
    $ref: './paths/arr.yaml#/library'
  /arr/library/episodes:
    $ref: './paths/arr.yaml#/episodes'
  /arr/releases:
    $ref: './paths/arr.yaml#/releases'
  /arr/cleanup:
    $ref: './paths/arr.yaml#/cleanup'
  /sync/preview:
    $ref: './paths/sync.yaml#/preview'
  /sync/preview/{previewId}:
    $ref: './paths/sync.yaml#/previewById'
  /sync/preview/{previewId}/apply:
    $ref: './paths/sync.yaml#/previewApply'
  /pcd/export:
    $ref: './paths/pcd.yaml#/export'
  /pcd/import:
    $ref: './paths/pcd.yaml#/import'
  /pcd/{databaseId}/lidarr-metadata-profiles:
    get:
      operationId: listLidarrMetadataProfiles
      summary: List Lidarr metadata profiles
      description: |
        Reads Lidarr metadata profiles from a PCD database.

        Metadata profiles are a Lidarr-only entity family and are not available
        for Radarr or Sonarr entities.

        Read payloads are list DTOs that expose counts, not full type payloads.
      tags:
        - PCD
      parameters:
        - name: databaseId
          in: path
          required: true
          description: PCD database ID
          schema:
            type: integer
      responses:
        '200':
          description: Metadata profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LidarrMetadataProfileListItem'
        '400':
          description: Missing or invalid databaseId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Database not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to read cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
    post:
      operationId: createLidarrMetadataProfile
      summary: Create a Lidarr metadata profile
      description: |
        Creates a Lidarr metadata profile in the selected PCD database.

        Runtime validation enforces Lidarr-specific rules including:
        - case-insensitive unique profile name
        - reserved name `None` is rejected
        - all source categories include explicit `allowed` booleans
        - type/status rows in write payloads use `id`, `name`, and `allowed`.
      tags:
        - PCD
      parameters:
        - name: databaseId
          in: path
          required: true
          description: PCD database ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LidarrMetadataProfileCreateRequest'
      responses:
        '200':
          description: Metadata profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LidarrMetadataProfileMutationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '403':
          description: Base layer write is not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Write failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
  /pcd/{databaseId}/lidarr-metadata-profiles/{id}:
    get:
      operationId: getLidarrMetadataProfile
      summary: Get one Lidarr metadata profile
      description: |
        Returns a single Lidarr metadata profile by local profile id.

        Payloads are the PCD contract used by runtime sync and portable
        operations, not the Lidarr API payload shape.
      tags:
        - PCD
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          description: Local metadata profile id
          schema:
            type: integer
      responses:
        '200':
          description: Metadata profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LidarrMetadataProfile'
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Database or profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Failed to read profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
    put:
      operationId: updateLidarrMetadataProfile
      summary: Update a Lidarr metadata profile
      description: |
        Updates selected fields of an existing Lidarr metadata profile.

        Partial updates are supported for edit flows.
        Updates remain Lidarr-only and validate value-guard constraints.

        At least one mutable field must be provided.
        Updates use stable-name/value-guard semantics for concurrency safety.
      tags:
        - PCD
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          description: Local metadata profile id
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LidarrMetadataProfileUpdateRequest'
      responses:
        '200':
          description: Metadata profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LidarrMetadataProfileMutationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Database or profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
    delete:
      operationId: deleteLidarrMetadataProfile
      summary: Delete a Lidarr metadata profile
      description: |
        Deletes a Lidarr metadata profile by id.

        Deletes are rejected if runtime guard checks detect in-use rows or stale
        value guards.
        This endpoint must only be invoked for Lidarr-backed databases.
        Delete payloads must include the current row name for value-guard safety.
      tags:
        - PCD
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          description: Local metadata profile id
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LidarrMetadataProfileDeleteRequest'
      responses:
        '200':
          description: Metadata profile deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LidarrMetadataProfileMutationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '404':
          description: Database or profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'
        '500':
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcdErrorResponse'

components:
  schemas:
    # Common
    ComponentStatus:
      $ref: './schemas/common.yaml#/ComponentStatus'
    HealthStatus:
      $ref: './schemas/common.yaml#/HealthStatus'
    # Health
    HealthResponse:
      $ref: './schemas/health.yaml#/HealthResponse'
    # Entity Testing
    MediaType:
      $ref: './schemas/entity-testing.yaml#/MediaType'
    ParsedInfo:
      $ref: './schemas/entity-testing.yaml#/ParsedInfo'
    ReleaseInput:
      $ref: './schemas/entity-testing.yaml#/ReleaseInput'
    ReleaseEvaluation:
      $ref: './schemas/entity-testing.yaml#/ReleaseEvaluation'
    EvaluateRequest:
      $ref: './schemas/entity-testing.yaml#/EvaluateRequest'
    EvaluateResponse:
      $ref: './schemas/entity-testing.yaml#/EvaluateResponse'
    # Arr - Shared
    ArrType:
      $ref: './schemas/arr.yaml#/ArrType'
    CustomFormatRef:
      $ref: './schemas/arr.yaml#/CustomFormatRef'
    ScoreBreakdownItem:
      $ref: './schemas/arr.yaml#/ScoreBreakdownItem'
    ProfileByDatabase:
      $ref: './schemas/arr.yaml#/ProfileByDatabase'
    ErrorResponse:
      $ref: './schemas/arr.yaml#/ErrorResponse'
    # Arr - Library
    RadarrLibraryItem:
      $ref: './schemas/arr.yaml#/RadarrLibraryItem'
    SonarrSeasonItem:
      $ref: './schemas/arr.yaml#/SonarrSeasonItem'
    SonarrLibraryItem:
      $ref: './schemas/arr.yaml#/SonarrLibraryItem'
    LidarrLibraryItem:
      $ref: './schemas/arr.yaml#/LidarrLibraryItem'
    SonarrEpisodeItem:
      $ref: './schemas/arr.yaml#/SonarrEpisodeItem'
    LibraryRadarrResponse:
      $ref: './schemas/arr.yaml#/LibraryRadarrResponse'
    LibrarySonarrResponse:
      $ref: './schemas/arr.yaml#/LibrarySonarrResponse'
    LibraryLidarrResponse:
      $ref: './schemas/arr.yaml#/LibraryLidarrResponse'
    LibraryResponse:
      $ref: './schemas/arr.yaml#/LibraryResponse'
    EpisodesResponse:
      $ref: './schemas/arr.yaml#/EpisodesResponse'
    CacheInvalidatedResponse:
      $ref: './schemas/arr.yaml#/CacheInvalidatedResponse'
    # Arr - Releases
    GroupedRelease:
      $ref: './schemas/arr.yaml#/GroupedRelease'
    ReleasesResponse:
      $ref: './schemas/arr.yaml#/ReleasesResponse'
    # Arr - Cleanup
    StaleItem:
      $ref: './schemas/arr.yaml#/StaleItem'
    CleanupScanRequest:
      $ref: './schemas/arr.yaml#/CleanupScanRequest'
    CleanupExecuteRequest:
      $ref: './schemas/arr.yaml#/CleanupExecuteRequest'
    CleanupScanResult:
      $ref: './schemas/arr.yaml#/CleanupScanResult'
    CleanupDeleteResult:
      $ref: './schemas/arr.yaml#/CleanupDeleteResult'
    # Sync - Preview
    SyncPreviewCreateRequest:
      $ref: './schemas/sync.yaml#/SyncPreviewCreateRequest'
    SyncPreviewApplyRequest:
      $ref: './schemas/sync.yaml#/SyncPreviewApplyRequest'
    SyncPreviewStatus:
      $ref: './schemas/sync.yaml#/SyncPreviewStatus'
    SyncPreviewSection:
      $ref: './schemas/sync.yaml#/SyncPreviewSection'
    SyncPreviewSectionOutcome:
      $ref: './schemas/sync.yaml#/SyncPreviewSectionOutcome'
    SyncPreviewAction:
      $ref: './schemas/sync.yaml#/SyncPreviewAction'
    SyncPreviewFieldChangeType:
      $ref: './schemas/sync.yaml#/SyncPreviewFieldChangeType'
    FieldChange:
      $ref: './schemas/sync.yaml#/FieldChange'
    EntityChange:
      $ref: './schemas/sync.yaml#/EntityChange'
    QualityProfilesPreview:
      $ref: './schemas/sync.yaml#/QualityProfilesPreview'
    DelayProfilesPreview:
      $ref: './schemas/sync.yaml#/DelayProfilesPreview'
    MediaManagementPreview:
      $ref: './schemas/sync.yaml#/MediaManagementPreview'
    MetadataProfilesPreview:
      $ref: './schemas/sync.yaml#/MetadataProfilesPreview'
    SyncPreviewSummary:
      $ref: './schemas/sync.yaml#/SyncPreviewSummary'
    SyncPreviewResult:
      $ref: './schemas/sync.yaml#/SyncPreviewResult'
    # PCD
    EntityType:
      $ref: './schemas/pcd.yaml#/EntityType'
    ExportResponse:
      $ref: './schemas/pcd.yaml#/ExportResponse'
    PcdErrorResponse:
      $ref: './schemas/pcd.yaml#/PcdErrorResponse'
    ImportRequest:
      $ref: './schemas/pcd.yaml#/ImportRequest'
    ImportResponse:
      $ref: './schemas/pcd.yaml#/ImportResponse'
    LidarrMetadataProfileTypeToggle:
      type: object
      required:
        - id
        - name
        - allowed
      properties:
        id:
          type: integer
          description: |
            Lidarr identifier for an album or release-status entry used by write
            operations.
        name:
          type: string
          description: Lidarr album type name
        allowed:
          type: boolean
          description: Whether the type is selected
    LidarrMetadataProfileAlbumType:
      type: object
      required:
        - type_id
        - name
        - allowed
      properties:
        type_id:
          type: integer
          description: Lidarr primary/secondary album type id in read models
        name:
          type: string
          description: Lidarr album type name
        allowed:
          type: boolean
          description: Whether the type is selected
    LidarrMetadataProfileReleaseStatusToggle:
      type: object
      required:
        - id
        - name
        - allowed
      properties:
        id:
          type: integer
          description: Lidarr release status id
        name:
          type: string
          description: Lidarr release status name
        allowed:
          type: boolean
          description: Whether the status is selected
    LidarrMetadataProfileReleaseStatus:
      type: object
      required:
        - status_id
        - name
        - allowed
      properties:
        status_id:
          type: integer
          description: Lidarr release status id in read models
        name:
          type: string
          description: Lidarr release status name
        allowed:
          type: boolean
          description: Whether the status is selected
    LidarrMetadataProfile:
      type: object
      required:
        - id
        - name
        - description
        - updated_at
        - primaryTypes
        - secondaryTypes
        - releaseStatuses
      properties:
        id:
          type: integer
          description: Local profile id in PCD cache
        name:
          type: string
        description:
          type: string
          nullable: true
          description: Optional Praxrr-only description for local documentation.
        updated_at:
          type: string
          description: Last profile update timestamp in the PCD cache
        primaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileAlbumType'
        secondaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileAlbumType'
        releaseStatuses:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileReleaseStatus'
    LidarrMetadataProfileListItem:
      type: object
      required:
        - id
        - name
        - description
        - updated_at
        - primaryTypeCount
        - secondaryTypeCount
        - releaseStatusCount
        - primaryAllowedCount
        - secondaryAllowedCount
        - releaseStatusAllowedCount
      properties:
        id:
          type: integer
          description: Local profile id in PCD cache
        name:
          type: string
        description:
          type: string
          nullable: true
          description: Optional Praxrr-only description for local documentation.
        updated_at:
          type: string
          description: Last profile update timestamp in the PCD cache
        primaryTypeCount:
          type: integer
          description: Total number of primary types represented in the profile
        secondaryTypeCount:
          type: integer
          description: Total number of secondary types represented in the profile
        releaseStatusCount:
          type: integer
          description: Total number of release statuses represented in the profile
        primaryAllowedCount:
          type: integer
          description: Number of allowed primary types
        secondaryAllowedCount:
          type: integer
          description: Number of allowed secondary types
        releaseStatusAllowedCount:
          type: integer
          description: Number of allowed release statuses
    LidarrMetadataProfileCreateRequest:
      type: object
      required:
        - name
        - primaryTypes
        - secondaryTypes
        - releaseStatuses
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        layer:
          type: string
          enum:
            - user
            - base
          default: user
          description: Write target for the operation. Defaults to user.
        primaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileTypeToggle'
        secondaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileTypeToggle'
        releaseStatuses:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileReleaseStatusToggle'
      description: |
        Create payload for Lidarr metadata profile entities.

        Full arrays are expected for each section group; runtime validation enforces:
        - all known types/statuses are represented with explicit `allowed` flags
        - at least one enabled primary, one enabled secondary, one enabled status
        - reserved profile name `None` is rejected
        - case-insensitive name uniqueness in the target PCD database
    LidarrMetadataProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        layer:
          type: string
          enum:
            - user
            - base
          default: user
          description: Write target for the operation. Defaults to user.
        primaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileTypeToggle'
        secondaryTypes:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileTypeToggle'
        releaseStatuses:
          type: array
          items:
            $ref: '#/components/schemas/LidarrMetadataProfileReleaseStatusToggle'
      description: |
        Partial update payload for Lidarr metadata profile entities.

        Omitted fields are preserved by the write layer.
    LidarrMetadataProfileDeleteRequest:
      type: object
      required:
        - name
      properties:
        layer:
          type: string
          enum:
            - user
            - base
          default: user
          description: Write target for the operation. Defaults to user.
        name:
          type: string
          minLength: 1
          description: |
            Current row name used by value guards for concurrency detection.
    LidarrMetadataProfileMutationResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        error:
          type: string
          nullable: true
    # Startup Pull
    StartupPullRunStatus:
      type: string
      enum:
        - success
        - partial
        - failed
        - skipped
        - disabled
      description: |
        Run-level status for a startup pull execution.
        - `success`: All instances completed without failures
        - `partial`: Some instances succeeded and some failed
        - `failed`: All instances failed
        - `skipped`: No instances were processed
        - `disabled`: Feature was disabled at run time
    StartupPullInstanceStatus:
      type: string
      enum:
        - success
        - failure
        - skipped
        - cancelled
      description: Per-instance outcome status following JobRunStatus semantics
    StartupPullInstanceOutcome:
      type: object
      required:
        - id
        - instanceId
        - instanceName
        - arrType
        - status
        - imported
        - skippedDefault
        - skippedNoMatch
        - conflicted
        - failed
        - createdAt
      properties:
        id:
          type: integer
          description: Outcome row id
        instanceId:
          type: integer
          description: Arr instance id
        instanceName:
          type: string
          description: Arr instance name at time of run
        arrType:
          type: string
          description: Arr application type (radarr, sonarr, lidarr)
        status:
          $ref: '#/components/schemas/StartupPullInstanceStatus'
        imported:
          type: integer
          description: Number of entities imported for this instance
        skippedDefault:
          type: integer
          description: Number of entities skipped as defaults
        skippedNoMatch:
          type: integer
          description: Number of entities with no local match
        conflicted:
          type: integer
          description: Number of entities with ambiguous matches
        failed:
          type: integer
          description: Number of entities that failed processing
        createdAt:
          type: string
          description: Outcome creation timestamp
    StartupPullRunResponse:
      type: object
      required:
        - id
        - status
        - startedAt
        - finishedAt
        - imported
        - skippedDefault
        - skippedNoMatch
        - conflicted
        - failed
        - instancesTotal
        - instancesFailed
        - createdAt
        - instances
      properties:
        id:
          type: string
          description: Unique run identifier
        status:
          $ref: '#/components/schemas/StartupPullRunStatus'
        startedAt:
          type: string
          description: Run start timestamp
        finishedAt:
          type: string
          nullable: true
          description: Run completion timestamp, null if still running
        imported:
          type: integer
          description: Total entities imported across all instances
        skippedDefault:
          type: integer
          description: Total entities skipped as defaults across all instances
        skippedNoMatch:
          type: integer
          description: Total entities with no local match across all instances
        conflicted:
          type: integer
          description: Total entities with ambiguous matches across all instances
        failed:
          type: integer
          description: Total entities that failed processing across all instances
        instancesTotal:
          type: integer
          description: Total number of instances processed
        instancesFailed:
          type: integer
          description: Number of instances that failed
        createdAt:
          type: string
          description: Run record creation timestamp
        instances:
          type: array
          description: Per-instance outcomes for this run
          items:
            $ref: '#/components/schemas/StartupPullInstanceOutcome'
