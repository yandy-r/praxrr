GoalCategory:
  type: string
  description: Closed set of semantic categories a custom format is classified into.
  enum:
    - unwanted
    - hdr_dv
    - hdr_hdr10plus
    - hdr_baseline
    - remux
    - release_group_tier_1
    - release_group_tier_2
    - release_group_tier_3
    - audio_lossless
    - audio_advanced
    - audio_baseline
    - streaming_service
    - movie_version
    - repack_proper
    - resolution

GoalCeilingRelation:
  type: string
  enum:
    - above
    - match
    - below

GoalResolutionCeiling:
  type: string
  enum:
    - 720p
    - 1080p
    - 2160p

GoalWeights:
  type: object
  required:
    - qualityVsSize
    - compatibility
    - hdrPreference
    - unwantedStrictness
    - resolutionCeiling
  properties:
    qualityVsSize:
      type: integer
      minimum: 0
      maximum: 100
    compatibility:
      type: integer
      minimum: 0
      maximum: 100
    hdrPreference:
      type: integer
      minimum: 0
      maximum: 100
    unwantedStrictness:
      type: integer
      minimum: 0
      maximum: 100
    resolutionCeiling:
      $ref: '#/GoalResolutionCeiling'

GoalAxisMeta:
  type: object
  required:
    - key
    - label
    - kind
    - description
  properties:
    key:
      type: string
    label:
      type: string
    kind:
      type: string
      enum:
        - weight
        - strictness
        - ceiling
    min:
      type: integer
    max:
      type: integer
    step:
      type: integer
    options:
      type: array
      items:
        $ref: '#/GoalResolutionCeiling'
    description:
      type: string

GoalPreset:
  type: object
  required:
    - id
    - label
    - description
    - weights
  properties:
    id:
      type: string
      enum:
        - best-quality
        - smallest-size
        - balanced
        - 4k-hdr-priority
        - audio-lossless-priority
        - audio-balanced
        - audio-space-saver
    label:
      type: string
    description:
      type: string
    weights:
      $ref: '#/GoalWeights'

GoalAxisContribution:
  type: object
  required:
    - axis
    - delta
  properties:
    axis:
      type: string
    delta:
      type: integer

GoalReason:
  type: object
  required:
    - code
    - category
    - ruleId
    - base
    - axisContributions
    - ceiling
  properties:
    code:
      type: string
    category:
      oneOf:
        - $ref: '#/GoalCategory'
        - type: 'null'
    ruleId:
      type: string
    base:
      type: integer
    axisContributions:
      type: array
      items:
        $ref: '#/GoalAxisContribution'
    ceiling:
      oneOf:
        - $ref: '#/GoalCeilingRelation'
        - type: 'null'

GoalCfDecision:
  type: object
  required:
    - customFormatName
    - arrType
    - category
    - score
    - reason
  properties:
    customFormatName:
      type: string
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
    category:
      $ref: '#/GoalCategory'
    score:
      type: integer
    reason:
      $ref: '#/GoalReason'

GoalUncategorizedCf:
  type: object
  required:
    - name
    - suggestedCategory
    - reason
  properties:
    name:
      type: string
    suggestedCategory:
      oneOf:
        - $ref: '#/GoalCategory'
        - type: 'null'
    reason:
      type: string

GoalCoverage:
  type: object
  required:
    - total
    - scored
    - uncategorized
  properties:
    total:
      type: integer
    scored:
      type: integer
    uncategorized:
      type: integer

GoalThresholds:
  type: object
  required:
    - minimumScore
    - upgradeUntilScore
    - upgradeScoreIncrement
  properties:
    minimumScore:
      type: integer
    upgradeUntilScore:
      type: integer
    upgradeScoreIncrement:
      type: integer

GoalPlan:
  type: object
  description: Deterministic translation of a goal into concrete scores + thresholds.
  required:
    - engineVersion
    - arrType
    - decisions
    - uncategorized
    - thresholds
    - coverage
    - qualityLadder
  properties:
    engineVersion:
      type: string
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
    decisions:
      type: array
      items:
        $ref: '#/GoalCfDecision'
    uncategorized:
      type: array
      items:
        $ref: '#/GoalUncategorizedCf'
    thresholds:
      $ref: '#/GoalThresholds'
    coverage:
      $ref: '#/GoalCoverage'
    qualityLadder:
      $ref: '#/GoalQualityLadder'

GoalQualityLadderItem:
  type: object
  description: 'One row of the ceiling-derived quality ladder (issue #221).'
  required:
    - name
    - type
    - enabled
    - upgradeUntil
    - position
    - resolution
    - mapped
  properties:
    name:
      type: string
    type:
      type: string
      enum:
        - quality
        - group
    enabled:
      type: boolean
    upgradeUntil:
      type: boolean
    position:
      type: integer
    resolution:
      oneOf:
        - type: integer
        - type: 'null'
    mapped:
      type: boolean
      description: False when the row is not present/derivable for the target arr (left unchanged).

GoalQualityLadder:
  type: object
  description: >-
    Ceiling-derived quality-ladder configuration (issue #221), always shown before persistence.
    A per-arr ceiling reshapes the shared quality_profile_qualities row set for every Arr that syncs
    the profile; sharedLadderNote surfaces that when the profile is sibling-compatible.
  required:
    - ceiling
    - cutoff
    - items
    - reshapesSiblingArrs
    - sharedLadderNote
  properties:
    ceiling:
      $ref: '#/GoalResolutionCeiling'
    cutoff:
      oneOf:
        - type: string
        - type: 'null'
      description: PCD quality name carrying the cutoff; null when no ladder change is derivable.
    items:
      type: array
      items:
        $ref: '#/GoalQualityLadderItem'
    reshapesSiblingArrs:
      type: boolean
    sharedLadderNote:
      oneOf:
        - type: string
        - type: 'null'

GoalBinding:
  type: object
  description: Persisted intent metadata for a goal-governed quality profile.
  required:
    - presetId
    - weights
    - engineVersion
    - appliedAt
  properties:
    presetId:
      type: string
    weights:
      $ref: '#/GoalWeights'
    engineVersion:
      type: string
    appliedAt:
      type: string
      description: ISO-8601 UTC timestamp of the last apply

GoalPresetsResponse:
  type: object
  required:
    - presets
    - axes
    - engineVersion
  properties:
    presets:
      type: array
      items:
        $ref: '#/GoalPreset'
    axes:
      type: array
      items:
        $ref: '#/GoalAxisMeta'
    engineVersion:
      type: string

GoalPreviewRequest:
  type: object
  required:
    - databaseId
    - arrType
    - profileName
    - preset
    - weights
  properties:
    databaseId:
      type: integer
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
    profileName:
      type: string
      description: Raw PCD quality-profile name (pcd:-stripped)
    preset:
      type: string
    weights:
      $ref: '#/GoalWeights'

GoalPreviewResponse:
  type: object
  description: Non-persisting preview — the plan plus the authoritative sandbox config diff.
  required:
    - plan
    - configDiff
    - appliedChanges
    - skippedChanges
  properties:
    plan:
      $ref: '#/GoalPlan'
    configDiff:
      type: array
      items:
        $ref: '../schemas/impact-simulator.yaml#/EntityConfigDiff'
    appliedChanges:
      type: array
      items:
        $ref: '../schemas/impact-simulator.yaml#/ProposedChange'
    skippedChanges:
      type: array
      items:
        $ref: '../schemas/impact-simulator.yaml#/SkippedChange'

GoalApplyRequest:
  type: object
  required:
    - databaseId
    - arrType
    - profileName
    - preset
    - weights
    - expectedEngineVersion
  properties:
    databaseId:
      type: integer
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
    profileName:
      type: string
    preset:
      type: string
    weights:
      $ref: '#/GoalWeights'
    expectedEngineVersion:
      type: string
      description: The engine version the client computed against; a mismatch yields 409.

GoalApplyResponse:
  type: object
  required:
    - plan
    - binding
    - configDiff
    - applyId
    - applyStatus
  properties:
    plan:
      $ref: '#/GoalPlan'
    binding:
      $ref: '#/GoalBinding'
    configDiff:
      type: array
      description: >-
        Authoritative sandbox config diff of the persisted ladder + scoring, captured before persist so
        it matches the preview diff for the same request (issue #221).
      items:
        $ref: '../schemas/impact-simulator.yaml#/EntityConfigDiff'
    applyId:
      type: integer
      description: 'The apply-journal row id for this apply (issue #236).'
    applyStatus:
      $ref: '#/GoalApplyStatus'

GoalBindingResponse:
  type: object
  required:
    - binding
  properties:
    binding:
      oneOf:
        - $ref: '#/GoalBinding'
        - type: 'null'
    applyStatus:
      description: >-
        The latest apply-journal outcome for this profile target, or null if none has been attempted.
        Surfaces a failed/pending apply — including a failure that never wrote a binding (issue #236).
      oneOf:
        - $ref: '#/GoalApplyStatus'
        - type: 'null'

GoalRecoveryAction:
  type: object
  description: 'The safe operator recovery action for a failed or pending Quality Goals apply (issue #236).'
  required:
    - action
  properties:
    action:
      type: string
      enum:
        - none
        - reconcile
    endpoint:
      oneOf:
        - type: string
        - type: 'null'

GoalApplyStatus:
  type: object
  description: >-
    Durable outcome of a Quality Goals apply/reconcile attempt (issue #236). Reports whether scoring
    changed, the binding's terminal state, and the safe recovery action, so a partial write is never
    unreported.
  required:
    - applyId
    - status
    - scoringChanged
    - bindingStatus
    - recovery
    - startedAt
  properties:
    applyId:
      type: integer
    status:
      type: string
      enum:
        - pending
        - succeeded
        - failed
    scoringChanged:
      type: boolean
      description: Whether the scoring ops reached (or may have reached) their intended terminal state.
    bindingStatus:
      type: string
      enum:
        - written
        - pending
        - failed
    failureStage:
      oneOf:
        - type: string
        - type: 'null'
    failureReason:
      oneOf:
        - type: string
        - type: 'null'
    intentFingerprint:
      type: string
    startedAt:
      type: string
    settledAt:
      oneOf:
        - type: string
        - type: 'null'
    recovery:
      $ref: '#/GoalRecoveryAction'

GoalApplyFailure:
  type: object
  description: >-
    Structured failure body for a Quality Goals apply/reconcile (issue #236). `message` mirrors
    ErrorResponse's human text (the UI failure reader falls back to `error`), and `applyStatus` carries
    the reported outcome + recovery action.
  required:
    - message
    - applyStatus
  properties:
    message:
      type: string
    applyStatus:
      $ref: '#/GoalApplyStatus'

GoalReconcileRequest:
  type: object
  description: 'Recover a partial or pending Quality Goals apply by re-driving the recorded intent (#236).'
  required:
    - databaseId
    - arrType
    - profileName
    - expectedEngineVersion
  properties:
    databaseId:
      type: integer
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
    profileName:
      type: string
    expectedEngineVersion:
      type: string

GoalReconcileResponse:
  allOf:
    - $ref: '#/GoalApplyResponse'
    - type: object
      required:
        - reconciled
        - alreadyApplied
        - applyStatus
      properties:
        reconciled:
          type: boolean
          description: Whether ops were persisted this call (false when live already matched the intent).
        alreadyApplied:
          type: boolean
          description: Whether the live state already equalled the recorded intent (a no-op reconcile).
        applyStatus:
          $ref: '#/GoalApplyStatus'
