SyncTrigger:
  type: string
  enum:
    - manual
    - schedule
    - system
  description: How a sync run was initiated.

SyncOperationStatus:
  type: string
  enum:
    - success
    - partial
    - failed
    - skipped
  description: Terminal status of an audited sync run.

SyncSectionResult:
  type: object
  required:
    - section
    - status
    - itemsSynced
    - error
  properties:
    section:
      $ref: '../schemas/sync.yaml#/SyncPreviewSection'
    status:
      type: string
      enum:
        - success
        - failed
        - skipped
    itemsSynced:
      type: integer
      minimum: 0
    error:
      oneOf:
        - type: string
        - type: 'null'
    failedProfiles:
      type: array
      items:
        type: string

SyncEntityChange:
  type: object
  required:
    - section
    - category
    - entityType
    - name
    - action
    - remoteId
    - fields
  properties:
    section:
      $ref: '../schemas/sync.yaml#/SyncPreviewSection'
    category:
      type: string
      description: Sibling collection within the section (e.g. customFormats, naming).
    entityType:
      type: string
    name:
      type: string
      description: Entity display name (namespace-stripped).
    action:
      $ref: '../schemas/sync.yaml#/SyncPreviewAction'
    remoteId:
      type: integer
      nullable: true
    fields:
      type: array
      description: Field-level diff (`current` = live/old, `desired` = PCD/new).
      items:
        $ref: '../schemas/sync.yaml#/FieldChange'

SyncHistoryEntry:
  type: object
  required:
    - id
    - arrInstanceId
    - instanceName
    - arrType
    - jobId
    - trigger
    - triggerEvent
    - sectionsAttempted
    - status
    - sectionsRun
    - itemsSynced
    - failureCount
    - entityChangeCount
    - entityOutcomeCount
    - previewId
    - error
    - startedAt
    - finishedAt
    - durationMs
    - createdAt
  properties:
    id:
      type: integer
    arrInstanceId:
      oneOf:
        - type: integer
        - type: 'null'
      description: Null when the source instance was deleted after this run.
    instanceName:
      type: string
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
    jobId:
      oneOf:
        - type: integer
        - type: 'null'
    trigger:
      $ref: '#/SyncTrigger'
    triggerEvent:
      oneOf:
        - type: string
        - type: 'null'
    sectionsAttempted:
      type: array
      items:
        $ref: '../schemas/sync.yaml#/SyncPreviewSection'
    status:
      $ref: '#/SyncOperationStatus'
    sectionsRun:
      type: integer
      minimum: 0
    itemsSynced:
      type: integer
      minimum: 0
    failureCount:
      type: integer
      minimum: 0
    entityChangeCount:
      type: integer
      minimum: 0
    entityOutcomeCount:
      type: integer
      minimum: 0
      description: Number of confirmed per-entity outcomes captured from the actual Arr writes (issue #232).
    previewId:
      oneOf:
        - type: string
        - type: 'null'
      description: The reviewed sync preview this run applied, when known (plan↔run correlation).
    error:
      oneOf:
        - type: string
        - type: 'null'
    startedAt:
      type: string
      format: date-time
    finishedAt:
      oneOf:
        - type: string
          format: date-time
        - type: 'null'
    durationMs:
      oneOf:
        - type: integer
        - type: 'null'
    createdAt:
      type: string

SyncHistoryDetail:
  allOf:
    - $ref: '#/SyncHistoryEntry'
    - type: object
      required:
        - sectionResults
        - changes
        - entityOutcomes
      properties:
        sectionResults:
          type: array
          items:
            $ref: '#/SyncSectionResult'
        changes:
          type: array
          items:
            $ref: '#/SyncEntityChange'
        entityOutcomes:
          type: array
          description: Confirmed per-entity outcomes captured from the actual Arr writes (issue #232).
          items:
            $ref: '../schemas/sync.yaml#/SyncEntityOutcome'

SyncHistoryListResponse:
  type: object
  required:
    - items
    - page
    - pageSize
    - totalRecords
    - totalPages
    - hasNext
  properties:
    items:
      type: array
      items:
        $ref: '#/SyncHistoryEntry'
    page:
      type: integer
      minimum: 1
    pageSize:
      type: integer
      minimum: 1
    totalRecords:
      type: integer
      minimum: 0
    totalPages:
      type: integer
      minimum: 0
    hasNext:
      type: boolean

SyncHistorySettings:
  type: object
  required:
    - enabled
    - retentionDays
    - retentionMaxEntries
  properties:
    enabled:
      type: boolean
    retentionDays:
      type: integer
      minimum: 1
    retentionMaxEntries:
      type: integer
      minimum: 0
      description: Keep at most this many rows; 0 disables the entry cap (age-only retention).

SyncHistorySettingsUpdateRequest:
  type: object
  properties:
    enabled:
      type: boolean
    retentionDays:
      type: integer
      minimum: 1
    retentionMaxEntries:
      type: integer
      minimum: 0
