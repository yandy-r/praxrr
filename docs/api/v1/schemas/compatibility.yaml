ArrSemanticDifference:
  type: object
  required:
    - scope
    - apps
    - summary
    - detail
    - sourceRefs
  properties:
    scope:
      type: string
      enum:
        - custom_formats
        - quality_profiles
        - quality_definitions
        - delay_profiles
        - metadata_profiles
        - instances
        - library
        - releases
        - rename
        - upgrades
      description: Parity entity or workflow surface this semantic difference applies to
    apps:
      type: array
      items:
        type: string
        enum:
          - radarr
          - sonarr
          - lidarr
      description: Arr apps this entry applies to
    summary:
      type: string
      description: One-line summary of the semantic divergence
    detail:
      type: string
      description: Full explanation of why the divergence exists
    suggestion:
      type: string
      description: Suggested alternative or mitigation, when applicable
    sourceRefs:
      type: array
      items:
        type: string
      description: Prose file/symbol anchors for drift audits, not imports

ProfileCompatibility:
  type: object
  required:
    - name
    - compatibleArrTypes
    - basis
  properties:
    name:
      type: string
      description: Quality profile name
    compatibleArrTypes:
      type: array
      items:
        type: string
        enum:
          - radarr
          - sonarr
          - lidarr
      description: Arr app types this profile's enabled qualities are compatible with
    basis:
      type: string
      enum:
        - enabled-qualities
      description: Algorithm basis used to compute this compatibility verdict

ParityMapResponse:
  type: object
  required:
    - entities
    - apps
    - matrix
    - semanticDifferences
  properties:
    entities:
      type: array
      items:
        type: string
        enum:
          - custom_formats
          - quality_profiles
          - quality_definitions
          - delay_profiles
          - metadata_profiles
      description: PCD config entities tracked by the Cross-Arr Parity Map
    apps:
      type: array
      items:
        type: string
        enum:
          - radarr
          - sonarr
          - lidarr
      description: Arr app types represented as matrix columns
    matrix:
      type: array
      items:
        type: object
        required:
          - entity
          - label
          - radarr
          - sonarr
          - lidarr
        properties:
          entity:
            type: string
            enum:
              - custom_formats
              - quality_profiles
              - quality_definitions
              - delay_profiles
              - metadata_profiles
            description: Parity entity this row describes
          label:
            type: string
            description: Human-readable label for this entity row
          radarr:
            type: string
            enum:
              - native
              - shared
              - unsupported
            description: Radarr support status for this entity
          sonarr:
            type: string
            enum:
              - native
              - shared
              - unsupported
            description: Sonarr support status for this entity
          lidarr:
            type: string
            enum:
              - native
              - shared
              - unsupported
            description: Lidarr support status for this entity
      description: One row per parity entity, with a per-app support status column
    semanticDifferences:
      type: array
      items:
        $ref: '#/ArrSemanticDifference'
      description: Curated catalog of same-API-shape/different-domain-semantics divergences
    profiles:
      type: array
      items:
        $ref: '#/ProfileCompatibility'
      description: Per-profile Arr-type compatibility, when quality profile data is available

ArrSupportTier:
  type: string
  enum:
    - supported
    - degraded
    - unsupported
    - unknown
  description: Coarse support tier for a detected (arr_type, application version) pair

ArrSupportRange:
  type: object
  required:
    - minimumSupported
    - latestTested
  properties:
    minimumSupported:
      type: string
      description: Versions below this are unsupported
    minimumRecommended:
      type: string
      description: Versions below this are degraded (below recommended)
    latestTested:
      type: string
      description: Latest tested version; newer versions stay supported with an informational warning
    eolBelow:
      type: string
      description: Versions at or below this are degraded with an end-of-support advisory
    breakingAtOrAbove:
      type: string
      description: Versions at or above this are unsupported (known or expected breaking major)
    degradedFeatures:
      type: array
      items:
        type: string
      description: Feature surfaces gated to degraded when the tier is degraded
    eolNote:
      type: string
      description: Extra advisory copy surfaced with an end-of-support warning
    docsHref:
      type: string
      description: Documentation link surfaced with warnings

VersionSupportedFeature:
  type: object
  required:
    - feature
    - tiers
  properties:
    feature:
      type: string
      description: Feature surface (workflow or sync) this row describes
    tiers:
      type: object
      description: Per-tier resolved availability status for this feature
      additionalProperties:
        type: string
        enum:
          - available
          - degraded
          - unavailable

ArrVersionCompatibility:
  type: object
  required:
    - arrType
    - range
    - features
  properties:
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
      description: Arr application type
    range:
      $ref: '#/ArrSupportRange'
    features:
      type: array
      items:
        $ref: '#/VersionSupportedFeature'
      description: Per-feature availability across every support tier

VersionCompatibilityMatrix:
  type: object
  required:
    - apps
  properties:
    apps:
      type: array
      items:
        $ref: '#/ArrVersionCompatibility'
      description: Per-app feature-by-version-tier availability
