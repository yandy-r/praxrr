SecurityShieldBand:
  type: string
  description: Shield band derived from the 0–100 rollup. `unknown` only when every check was skipped.
  enum:
    - hardened
    - guarded
    - exposed
    - unknown

SecurityCheckId:
  type: string
  enum:
    - control_plane_auth
    - arr_transport
    - app_key_at_rest
    - credential_rotation
    - log_redaction
    - proxy_trust

SecurityArrType:
  type: string
  enum:
    - radarr
    - sonarr
    - lidarr

SecurityTone:
  type: string
  enum:
    - neutral
    - info
    - warning
    - danger

SecurityCheckStatus:
  type: string
  description: Presentation status derived from the check's score and severity.
  enum:
    - pass
    - advisory
    - attention
    - action
    - assured
    - na

SecurityTransportTier:
  type: string
  description: How an Arr connection's target host is classified from Praxrr's own knowledge (no probing).
  enum:
    - encrypted
    - loopback
    - docker-alias
    - private
    - unknown
    - public
    - mixed

SecurityDnsOutcome:
  type: string
  description: Closed result of bounded DNS evidence gathering for one stored Arr hostname.
  enum:
    - not-applicable
    - resolved
    - partial
    - timeout
    - failed
    - empty
    - budget-exceeded

SecurityDnsEvidenceSource:
  type: string
  description: Provenance of a DNS observation; cache hits retain the original observation time.
  enum:
    - none
    - fresh
    - cache

SecurityDnsAddressClassCounts:
  type: object
  additionalProperties: false
  description: Bounded address-class counts for one DNS record family; raw addresses are never exposed.
  required:
    - loopback
    - private
    - linkLocal
    - public
    - special
  properties:
    loopback:
      type: integer
      minimum: 0
      maximum: 16
    private:
      type: integer
      minimum: 0
      maximum: 16
    linkLocal:
      type: integer
      minimum: 0
      maximum: 16
    public:
      type: integer
      minimum: 0
      maximum: 16
    special:
      type: integer
      minimum: 0
      maximum: 16

SecurityDnsTransportEvidence:
  type: object
  additionalProperties: false
  description: Safe aggregate DNS evidence; excludes addresses, resolver details, CNAMEs, and error text.
  required:
    - outcome
    - source
    - ipv4
    - ipv6
    - retainedCount
    - observedAt
    - incomplete
    - truncated
    - addressClassesChanged
  properties:
    outcome:
      $ref: '#/SecurityDnsOutcome'
    source:
      $ref: '#/SecurityDnsEvidenceSource'
    ipv4:
      $ref: '#/SecurityDnsAddressClassCounts'
    ipv6:
      $ref: '#/SecurityDnsAddressClassCounts'
    retainedCount:
      type: integer
      minimum: 0
      maximum: 16
    observedAt:
      description: Original observation time, or null when no DNS observation exists.
      oneOf: [{ type: string, format: date-time }, { type: 'null' }]
    incomplete:
      type: boolean
    truncated:
      type: boolean
    addressClassesChanged:
      type: boolean

SecurityFix:
  type: object
  description: A concrete remediation target. `kind` discriminates which optional fields are present.
  required:
    - kind
  properties:
    kind:
      type: string
      enum:
        - settings-link
        - instance-link
        - env-var
        - docs
        - none
    href:
      type: string
      description: Present for settings-link, instance-link, and docs.
    label:
      type: string
    name:
      type: string
      description: The environment variable name (env-var kind).
    docHref:
      type: string
      description: Optional documentation link (env-var kind).
    instanceId:
      type: integer
      description: Present for instance-link.

SecurityRecommendation:
  type: object
  description: A non-shaming remediation line paired with its concrete fix.
  required:
    - headline
    - detail
    - tone
    - templateVersion
    - fix
  properties:
    headline:
      type: string
    detail:
      type: array
      items:
        type: string
    tone:
      $ref: '#/SecurityTone'
    templateVersion:
      type: string
    fix:
      $ref: '#/SecurityFix'

SecurityCheck:
  type: object
  description: One scored check's contribution to the shield report.
  required:
    - id
    - label
    - score
    - weight
    - contribution
    - recoverablePoints
    - status
    - critical
    - detail
    - recommendations
  properties:
    id:
      $ref: '#/SecurityCheckId'
    label:
      type: string
    score:
      description: 0–100 sub-score, or null when the check could not be evaluated (excluded from the rollup).
      oneOf:
        - type: integer
          minimum: 0
          maximum: 100
        - type: 'null'
    weight:
      type: integer
      minimum: 0
    contribution:
      type: integer
    recoverablePoints:
      type: integer
      minimum: 0
    status:
      $ref: '#/SecurityCheckStatus'
    critical:
      type: boolean
    detail:
      type: array
      items:
        type: string
    recommendations:
      type: array
      items:
        $ref: '#/SecurityRecommendation'

SecurityTransportRow:
  type: object
  description: One enabled Arr connection's transport posture (host only — never the API key).
  required:
    - instanceId
    - instanceName
    - arrType
    - scheme
    - host
    - tier
    - score
    - status
    - dns
    - fix
  properties:
    instanceId:
      type: integer
    instanceName:
      type: string
    arrType:
      $ref: '#/SecurityArrType'
    scheme:
      type: string
      enum:
        - http
        - https
    host:
      type: string
    tier:
      $ref: '#/SecurityTransportTier'
    score:
      oneOf:
        - type: integer
          minimum: 0
          maximum: 100
        - type: 'null'
    status:
      $ref: '#/SecurityCheckStatus'
    dns:
      $ref: '#/SecurityDnsTransportEvidence'
    fix:
      $ref: '#/SecurityFix'

SecurityAssurance:
  type: object
  description: An always-on protection surfaced as a verified affirmation (contributes zero to the score).
  required:
    - id
    - label
    - verified
    - note
  properties:
    id:
      type: string
    label:
      type: string
    verified:
      type: boolean
    note:
      type: string

SecurityAdvisory:
  type: object
  description: A real posture note whose exploitability Praxrr cannot observe, so it informs without a score.
  required:
    - id
    - label
    - detail
    - fix
  properties:
    id:
      type: string
    label:
      type: string
    detail:
      type: array
      items:
        type: string
    fix:
      $ref: '#/SecurityFix'

SecurityTopAction:
  type: object
  description: A ranked "to reach Hardened" step derived from a scored check below 100.
  required:
    - checkId
    - headline
    - tone
    - recoverablePoints
    - fix
  properties:
    checkId:
      $ref: '#/SecurityCheckId'
    headline:
      type: string
    tone:
      $ref: '#/SecurityTone'
    recoverablePoints:
      type: integer
      minimum: 0
    fix:
      $ref: '#/SecurityFix'

SecurityBandCap:
  type: object
  required:
    - checkId
    - label
  properties:
    checkId:
      $ref: '#/SecurityCheckId'
    label:
      type: string

SecurityPostureSummaryResponse:
  type: object
  description: The live shield report for one deployment — computed on demand, never persisted.
  required:
    - engineVersion
    - generatedAt
    - score
    - band
    - bandCappedBy
    - checks
    - transport
    - assurances
    - advisories
    - topActions
  properties:
    engineVersion:
      type: string
    generatedAt:
      type: string
      format: date-time
    score:
      type: integer
      minimum: 0
      maximum: 100
    band:
      $ref: '#/SecurityShieldBand'
    bandCappedBy:
      description: The critical finding that lowered the band below the numeric average, or null.
      oneOf:
        - $ref: '#/SecurityBandCap'
        - type: 'null'
    checks:
      type: array
      items:
        $ref: '#/SecurityCheck'
    transport:
      type: array
      items:
        $ref: '#/SecurityTransportRow'
    assurances:
      type: array
      items:
        $ref: '#/SecurityAssurance'
    advisories:
      type: array
      items:
        $ref: '#/SecurityAdvisory'
    topActions:
      type: array
      items:
        $ref: '#/SecurityTopAction'
