ArrType:
  type: string
  enum:
    - radarr
    - sonarr
    - lidarr
  description: Type of Arr instance

# Shared types
CustomFormatRef:
  type: object
  required:
    - id
    - name
  properties:
    id:
      type: integer
      description: Custom format ID
    name:
      type: string
      description: Custom format name

ScoreBreakdownItem:
  type: object
  required:
    - name
    - score
  properties:
    name:
      type: string
      description: Custom format name
    score:
      type: integer
      description: Score assigned by the quality profile

ProfileByDatabase:
  type: object
  required:
    - databaseId
    - databaseName
    - profiles
  properties:
    databaseId:
      type: integer
      description: Praxrr database ID
    databaseName:
      type: string
      description: Praxrr database name
    profiles:
      type: array
      items:
        type: string
      description: Quality profile names in this database

# Library endpoint types - Radarr
RadarrLibraryItem:
  type: object
  required:
    - id
    - title
    - hasFile
    - qualityProfileId
    - qualityProfileName
    - isPraxrrProfile
    - customFormatScore
    - cutoffScore
    - minScore
    - progress
    - cutoffMet
    - customFormats
    - scoreBreakdown
  properties:
    id:
      type: integer
      description: Radarr movie ID
    tmdbId:
      type: integer
      description: TMDB ID
    title:
      type: string
      description: Movie title
    year:
      type: integer
      description: Release year
    qualityProfileId:
      type: integer
      description: Assigned quality profile ID
    qualityProfileName:
      type: string
      description: Assigned quality profile name
    hasFile:
      type: boolean
      description: Whether the movie has a downloaded file
    dateAdded:
      type: string
      format: date-time
      description: When the movie was added
    popularity:
      type: number
      description: TMDB popularity score
    qualityName:
      type: string
      nullable: true
      description: Quality of the downloaded file (null if no file)
    fileName:
      type: string
      nullable: true
      description: File name of the downloaded file (null if no file)
    customFormats:
      type: array
      items:
        $ref: '#/CustomFormatRef'
      description: Custom formats matched on the file
    customFormatScore:
      type: integer
      description: Total custom format score
    scoreBreakdown:
      type: array
      items:
        $ref: '#/ScoreBreakdownItem'
      description: Per-custom-format score breakdown
    cutoffScore:
      type: integer
      description: Profile cutoff score threshold
    minScore:
      type: integer
      description: Profile minimum score threshold
    progress:
      type: number
      description: Score progress toward cutoff (0-1+)
    cutoffMet:
      type: boolean
      description: Whether the cutoff score has been met
    isPraxrrProfile:
      type: boolean
      description: Whether the profile is managed by Praxrr

# Library endpoint types - Sonarr
SonarrSeasonItem:
  type: object
  required:
    - seasonNumber
    - monitored
    - episodeCount
    - episodeFileCount
    - totalEpisodeCount
    - sizeOnDisk
    - percentOfEpisodes
  properties:
    seasonNumber:
      type: integer
      description: Season number (0 = specials)
    monitored:
      type: boolean
      description: Whether this season is monitored
    episodeCount:
      type: integer
      description: Number of aired episodes
    episodeFileCount:
      type: integer
      description: Number of episodes with files
    totalEpisodeCount:
      type: integer
      description: Total episodes including unaired
    sizeOnDisk:
      type: integer
      description: Total size of episode files in bytes
    percentOfEpisodes:
      type: number
      description: Percentage of episodes with files (0-100)

SonarrLibraryItem:
  type: object
  required:
    - id
    - title
    - qualityProfileId
    - qualityProfileName
    - monitored
    - seasonCount
    - episodeCount
    - episodeFileCount
    - totalEpisodeCount
    - sizeOnDisk
    - percentOfEpisodes
    - seasons
    - isPraxrrProfile
  properties:
    id:
      type: integer
      description: Sonarr series ID
    tvdbId:
      type: integer
      description: TVDB ID
    title:
      type: string
      description: Series title
    year:
      type: integer
      description: First air year
    qualityProfileId:
      type: integer
      description: Assigned quality profile ID
    qualityProfileName:
      type: string
      description: Assigned quality profile name
    status:
      type: string
      description: Series status (continuing, ended, etc.)
    monitored:
      type: boolean
      description: Whether the series is monitored
    seasonCount:
      type: integer
      description: Number of seasons
    episodeCount:
      type: integer
      description: Number of aired episodes
    episodeFileCount:
      type: integer
      description: Number of episodes with files
    totalEpisodeCount:
      type: integer
      description: Total episodes including unaired
    sizeOnDisk:
      type: integer
      description: Total size of all episode files in bytes
    percentOfEpisodes:
      type: number
      description: Percentage of episodes with files (0-100)
    dateAdded:
      type: string
      format: date-time
      description: When the series was added
    seasons:
      type: array
      items:
        $ref: '#/SonarrSeasonItem'
      description: Season-level statistics
    isPraxrrProfile:
      type: boolean
      description: Whether the profile is managed by Praxrr

LidarrLibraryItem:
  type: object
  additionalProperties: true
  description: |
    Placeholder contract for Lidarr library payload items.
    Lidarr-specific artist/album fields remain capability-gated for later phases.

SonarrEpisodeItem:
  type: object
  required:
    - id
    - episodeNumber
    - seasonNumber
    - title
    - hasFile
    - monitored
    - customFormatScore
    - cutoffScore
    - progress
    - cutoffMet
    - customFormats
    - scoreBreakdown
  properties:
    id:
      type: integer
      description: Sonarr episode ID
    episodeNumber:
      type: integer
      description: Episode number within the season
    seasonNumber:
      type: integer
      description: Season number
    title:
      type: string
      description: Episode title
    hasFile:
      type: boolean
      description: Whether the episode has a downloaded file
    monitored:
      type: boolean
      description: Whether the episode is monitored
    qualityName:
      type: string
      description: Quality of the downloaded file
    fileName:
      type: string
      description: File name of the downloaded file
    size:
      type: integer
      description: File size in bytes
    customFormats:
      type: array
      items:
        $ref: '#/CustomFormatRef'
      description: Custom formats matched on the file
    customFormatScore:
      type: integer
      description: Total custom format score
    scoreBreakdown:
      type: array
      items:
        $ref: '#/ScoreBreakdownItem'
      description: Per-custom-format score breakdown
    cutoffScore:
      type: integer
      description: Profile cutoff score threshold
    progress:
      type: number
      description: Score progress toward cutoff (0-1+)
    cutoffMet:
      type: boolean
      description: Whether the cutoff score has been met

# Library response wrappers

LibraryRadarrResponse:
  type: object
  required:
    - type
    - items
    - profilesByDatabase
    - page
    - pageSize
    - totalRecords
    - totalPages
    - hasNext
  properties:
    type:
      type: string
      enum:
        - radarr
    items:
      type: array
      items:
        $ref: '#/RadarrLibraryItem'
    profilesByDatabase:
      type: array
      items:
        $ref: '#/ProfileByDatabase'
    page:
      type: integer
      description: Current page number
    pageSize:
      type: integer
      description: Current items per page
    totalRecords:
      type: integer
      description: Total number of records after search/filtering before pagination
    totalPages:
      type: integer
      description: Total page count derived from totalRecords and pageSize
    hasNext:
      type: boolean
      description: Indicates whether additional pages are available

LibrarySonarrResponse:
  type: object
  required:
    - type
    - items
    - profilesByDatabase
    - page
    - pageSize
    - totalRecords
    - totalPages
    - hasNext
  properties:
    type:
      type: string
      enum:
        - sonarr
    items:
      type: array
      items:
        $ref: '#/SonarrLibraryItem'
    profilesByDatabase:
      type: array
      items:
        $ref: '#/ProfileByDatabase'
    page:
      type: integer
      description: Current page number
    pageSize:
      type: integer
      description: Current items per page
    totalRecords:
      type: integer
      description: Total number of records after search/filtering before pagination
    totalPages:
      type: integer
      description: Total page count derived from totalRecords and pageSize
    hasNext:
      type: boolean
      description: Indicates whether additional pages are available

LibraryLidarrResponse:
  type: object
  required:
    - type
    - items
    - profilesByDatabase
    - page
    - pageSize
    - totalRecords
    - totalPages
    - hasNext
  properties:
    type:
      type: string
      enum:
        - lidarr
    items:
      type: array
      items:
        $ref: '#/LidarrLibraryItem'
    profilesByDatabase:
      type: array
      items:
        $ref: '#/ProfileByDatabase'
    page:
      type: integer
      description: Current page number
    pageSize:
      type: integer
      description: Current items per page
    totalRecords:
      type: integer
      description: Total number of records after search/filtering before pagination
    totalPages:
      type: integer
      description: Total page count derived from totalRecords and pageSize
    hasNext:
      type: boolean
      description: Indicates whether additional pages are available

LibraryResponse:
  oneOf:
    - $ref: '#/LibraryRadarrResponse'
    - $ref: '#/LibrarySonarrResponse'
    - $ref: '#/LibraryLidarrResponse'
  description: |
    Library response varies by instance type.
    Payload details for partially supported families remain capability-gated until
    their dedicated library routes are available.

EpisodesResponse:
  type: object
  required:
    - episodes
  properties:
    episodes:
      type: array
      items:
        $ref: '#/SonarrEpisodeItem'
      description: Episode details with quality and score data (Sonarr-only in current phase)

CacheInvalidatedResponse:
  type: object
  required:
    - success
  properties:
    success:
      type: boolean
      description: Whether the cache was invalidated

# Releases endpoint types
GroupedRelease:
  type: object
  required:
    - title
    - size
    - languages
    - indexers
    - flags
  properties:
    title:
      type: string
      description: Release title
    size:
      type: integer
      description: Release size in bytes
    languages:
      type: array
      items:
        type: string
      description: Languages detected in the release
    indexers:
      type: array
      items:
        type: string
      description: Indexers where this release was found
    flags:
      type: array
      items:
        type: string
      description: Release flags (e.g., freeleech, internal)

ReleasesResponse:
  type: object
  required:
    - type
    - rawCount
    - releases
  properties:
    type:
      $ref: '#/ArrType'
    rawCount:
      type: integer
      description: Total number of raw releases before grouping
    releases:
      type: array
      items:
        $ref: '#/GroupedRelease'
      description: Grouped and deduplicated releases

ErrorResponse:
  type: object
  required:
    - error
  properties:
    error:
      type: string
      description: Error message

# Cleanup endpoint types
StaleItem:
  type: object
  required:
    - id
    - name
    - strippedName
  properties:
    id:
      type: integer
      description: Arr entity ID
    name:
      type: string
      description: Full name including namespace suffix
    strippedName:
      type: string
      description: Name with namespace suffix removed

CleanupScanRequest:
  type: object
  required:
    - instanceId
    - action
  properties:
    instanceId:
      type: integer
      description: Arr instance ID
    action:
      type: string
      enum:
        - scan

CleanupExecuteRequest:
  type: object
  required:
    - instanceId
    - action
    - scanResult
  properties:
    instanceId:
      type: integer
      description: Arr instance ID
    action:
      type: string
      enum:
        - execute
    scanResult:
      $ref: '#/CleanupScanResult'

CleanupScanResult:
  type: object
  required:
    - staleCustomFormats
    - staleQualityProfiles
  properties:
    staleCustomFormats:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Custom formats that are no longer in sync selections
    staleQualityProfiles:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Quality profiles that are no longer in sync selections

SkippedItem:
  type: object
  required:
    - item
    - reason
  properties:
    item:
      $ref: '#/StaleItem'
    reason:
      type: string
      description: Why the item was skipped (e.g. "Profile is assigned to media")

CleanupDeleteResult:
  type: object
  required:
    - deletedCustomFormats
    - deletedQualityProfiles
    - skippedQualityProfiles
  properties:
    deletedCustomFormats:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Custom formats that were successfully deleted
    deletedQualityProfiles:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Quality profiles that were successfully deleted
    skippedQualityProfiles:
      type: array
      items:
        $ref: '#/SkippedItem'
      description: Quality profiles that were skipped (assigned to media)
