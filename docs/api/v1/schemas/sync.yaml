SyncPreviewCreateRequest:
  type: object
  required:
    - instanceId
  properties:
    instanceId:
      type: integer
      description: Arr instance ID to preview
    sections:
      type: array
      description: Optional section filters for preview generation
      items:
        $ref: '#/SyncPreviewSection'
    sectionConfigs:
      $ref: '#/SyncPreviewSectionConfigs'

SyncPreviewSectionConfigs:
  type: object
  additionalProperties: false
  maxProperties: 4
  description: |
    Optional transient configuration overrides used to materialize the selected
    preview sections. These values are bound as reviewed execution state: apply
    revalidates and executes with the same effective configuration instead of
    silently falling back to newly saved configuration. The server retains the
    normalized values only in the private, expiring preview envelope; they are
    never included in preview or apply responses.
  properties:
    qualityProfiles:
      description: Effective quality-profile section configuration to review and bind.
    delayProfiles:
      description: Effective delay-profile section configuration to review and bind.
    mediaManagement:
      description: Effective media-management section configuration to review and bind.
    metadataProfiles:
      description: Effective metadata-profile section configuration to review and bind.

SyncPreviewApplyRequest:
  type: object
  properties:
    sections:
      type: array
      description: Optional section filters for preview application
      items:
        $ref: '#/SyncPreviewSection'

SyncPreviewFailureCode:
  type: string
  enum:
    - unreachable
    - timeout
    - unauthorized
    - notFound
    - rejected
    - serverError
    - sectionErrors
    - executionFailed
    - stale
    - internalError
  description: |
    Closed vocabulary of Sync Preview generate/apply failure reasons. Each value is
    assigned by matching a thrown error's TYPE/status (never by parsing message text),
    so no raw exception or secret-shaped string is ever transported:
    - `unreachable`: the Arr instance could not be reached (network/DNS/connection).
    - `timeout`: the Arr instance did not respond in time.
    - `unauthorized`: the Arr instance rejected the API key (HTTP 401/403).
    - `notFound`: a required Arr resource was not found (HTTP 404).
    - `rejected`: the Arr instance rejected the request (other HTTP 4xx).
    - `serverError`: the Arr instance returned a server error (HTTP 5xx).
    - `sectionErrors`: one or more sections failed to generate (top-level aggregate).
    - `executionFailed`: the apply sync run did not complete successfully.
    - `stale`: the preview is too old to apply safely.
    - `internalError`: an unexpected error occurred (catch-all for untyped failures).

SyncPreviewFailureReason:
  type: object
  required:
    - code
    - message
    - recoveryAction
  description: |
    Typed, closed, safe failure evidence for Sync Preview generate/apply. Replaces the
    former free-form `error` strings. `message` and `recoveryAction` are pre-authored safe
    copy drawn from a closed vocabulary — they NEVER contain raw exception text, Arr
    response bodies, credentials, hostnames, or stack traces. Full diagnostics live only in
    the sanitized server logs.
  properties:
    code:
      $ref: '#/SyncPreviewFailureCode'
    message:
      type: string
      description: Safe, user-facing summary of the failure. Never raw exception or secret text.
    recoveryAction:
      type: string
      description: Actionable next step the operator can take to recover.

SyncPreviewApplyJobStatus:
  type: string
  enum:
    - success
    - failure
    - skipped
    - cancelled
  description: Terminal status returned by the sync job execution.

SyncPreviewApplyJobResult:
  type: object
  required:
    - status
    - output
  properties:
    status:
      $ref: '#/SyncPreviewApplyJobStatus'
    output:
      type: string
      description: Aggregate human-readable output from the sync job.
    failure:
      oneOf:
        - $ref: '#/SyncPreviewFailureReason'
        - type: 'null'
      description: |
        Typed, safe failure reason when the sync run did not succeed; omitted or null
        otherwise. Replaces the former free-form `error` string — the raw job error is
        never transported and remains only in sanitized logs and per-entity outcomes.

SyncPreviewApplyResponse:
  type: object
  description: |
    Result of executing the preview's selected sections through the normal sync job
    path. `results` describes the aggregate job/run outcome; `outcomes` carries the
    confirmed, per-entity terminal results captured from the ACTUAL Arr writes
    (issue #232) — these, not the planned preview changes, are execution proof.
  required:
    - success
    - results
    - staleWarning
    - outcomes
    - syncHistoryId
  properties:
    success:
      type: boolean
      description: True when the sync job succeeded or reported that no work was needed.
    results:
      $ref: '#/SyncPreviewApplyJobResult'
    staleWarning:
      oneOf:
        - type: string
        - type: 'null'
      description: Preview-age warning returned when the reviewed snapshot is stale, or null.
    outcomes:
      type: array
      description: |
        Confirmed per-entity outcomes captured from the actual Arr writes. Present on
        both success and partial/failure responses so failed and skipped outcomes are
        never dropped.
      items:
        $ref: '#/SyncEntityOutcome'
    syncHistoryId:
      oneOf:
        - type: integer
        - type: 'null'
      description: Durable Sync History id exposing these outcomes, or null when recording is disabled.

SyncPreviewApplyInvalidationCode:
  type: string
  enum:
    - pcd_drift
    - arr_drift
    - pcd_and_arr_drift
    - scope_drift
    - unverifiable_review
  description: |
    Closed reason for rejecting reviewed execution before any write:
    - `pcd_drift`: desired PCD, source, mapping, or reviewed configuration changed
    - `arr_drift`: material live Arr state changed
    - `pcd_and_arr_drift`: both PCD-side and live Arr evidence changed
    - `scope_drift`: the instance, Arr family, capability, or reviewed scope changed
    - `unverifiable_review`: authoritative evidence could not be read or compared safely

SyncPreviewChangedEvidence:
  type: string
  enum:
    - pcd
    - arr
  description: Public evidence class that changed; private fingerprints and raw evidence are never returned.

SyncPreviewApplyInvalidatedResponse:
  type: object
  additionalProperties: false
  description: |
    Safe pre-write rejection when the selected reviewed plan is no longer
    verifiable. No Arr write was attempted, so this response never contains
    confirmed outcomes, Sync History identifiers, private fingerprints,
    retained configuration, or raw PCD/Arr evidence.
  required:
    - error
    - code
    - changedEvidence
    - changedSections
    - regenerateRequired
    - staleWarning
  properties:
    error:
      type: string
      description: |
        Sanitized recovery text stating that nothing was applied and directing
        the operator to generate and review a new preview.
    code:
      $ref: '#/SyncPreviewApplyInvalidationCode'
    changedEvidence:
      type: array
      minItems: 0
      maxItems: 2
      uniqueItems: true
      description: |
        Bounded changed source classes. Empty for scope or unverifiable failures
        when PCD-side or Arr-side drift cannot be attributed safely.
      items:
        $ref: '#/SyncPreviewChangedEvidence'
    changedSections:
      type: array
      minItems: 1
      maxItems: 4
      uniqueItems: true
      description: Exact selected sections whose reviewed execution was invalidated.
      items:
        $ref: '#/SyncPreviewSection'
    regenerateRequired:
      type: boolean
      const: true
      description: Always true because an invalidated review cannot be retried.
    staleWarning:
      oneOf:
        - type: string
        - type: 'null'
      description: Preview-age warning when relevant to the rejection, or null.

SyncPreviewApplyErrorResponse:
  type: object
  additionalProperties: false
  required:
    - failure
    - staleWarning
  properties:
    failure:
      $ref: '#/SyncPreviewFailureReason'
    staleWarning:
      oneOf:
        - type: string
        - type: 'null'
      description: Preview-age warning when relevant to the failure, or null.

SyncPreviewStatus:
  type: string
  enum:
    - generating
    - ready
    - applying
    - applied
    - failed
    - expired
  description: |
    Preview lifecycle state:
    - `generating`: build in progress
    - `ready`: preview fully materialized and runnable
    - `applying`: preview is being executed as sync
    - `applied`: execution succeeded
    - `failed`: generation or execution failed
    - `expired`: staleness TTL elapsed

SyncPreviewSection:
  type: string
  enum:
    - qualityProfiles
    - delayProfiles
    - mediaManagement
    - metadataProfiles
  description: Sync section handled by preview generation

SyncPreviewAction:
  type: string
  enum:
    - create
    - update
    - delete
    - unchanged

SyncPreviewFieldChangeType:
  type: string
  enum:
    - added
    - changed
    - removed

FieldChange:
  type: object
  required:
    - field
    - type
    - current
    - desired
  properties:
    field:
      type: string
      description: Dot-notated field path
    type:
      $ref: '#/SyncPreviewFieldChangeType'
    current:
      description: Previous value from Arr GET state
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: array
        - type: object
          additionalProperties: true
        - type: null
    desired:
      description: Desired value after sync transformation
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: array
        - type: object
          additionalProperties: true
        - type: null

EntityChange:
  type: object
  required:
    - entityType
    - name
    - action
    - remoteId
    - fields
  properties:
    entityType:
      type: string
      description: Sync target entity kind (e.g., customFormat, qualityProfile)
    name:
      type: string
      description: Entity display name (namespace-stripped where applicable)
    action:
      $ref: '#/SyncPreviewAction'
    remoteId:
      type: integer
      nullable: true
      description: Arr entity ID when present
    fields:
      type: array
      description: Field-level diff; empty for unchanged/create where no deltas are tracked
      items:
        $ref: '#/FieldChange'

SyncEntityOutcomeAction:
  type: string
  enum:
    - create
    - update
    - delete
  description: The write attempted for an entity (intent). `delete` is reserved; no syncer emits it yet.

SyncEntityOutcomeStatus:
  type: string
  enum:
    - success
    - skipped
    - failed
  description: |
    Terminal status of a per-entity Arr write, sourced ONLY from the write result:
    `success` (resolved), `failed` (threw), `skipped` (intentionally not written).

SyncOutcomeEntityType:
  type: string
  enum:
    - customFormat
    - qualityProfile
    - delayProfile
    - metadataProfile
    - naming
    - mediaSettings
    - qualityDefinitions
  description: The kind of entity a confirmed outcome describes.

SyncEntityOutcome:
  type: object
  description: |
    A confirmed, per-entity terminal outcome captured from an actual Arr write
    (issue #232). Exactly one is produced per attempted entity. Unlike the preview
    EntityChange (planned intent), `status` proves what the Arr instance actually did.
  required:
    - section
    - arrType
    - entityType
    - name
    - action
    - status
    - remoteId
    - reason
  properties:
    section:
      $ref: '#/SyncPreviewSection'
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
      description: Arr type of the target instance — set explicitly by the syncer, never inferred.
    entityType:
      $ref: '#/SyncOutcomeEntityType'
    name:
      type: string
      description: Stable identity — the unsuffixed PCD name (or subsection label for singletons).
    action:
      $ref: '#/SyncEntityOutcomeAction'
    status:
      $ref: '#/SyncEntityOutcomeStatus'
    remoteId:
      oneOf:
        - type: string
        - type: 'null'
      description: Remote entity id when known; null for bulk writes.
    reason:
      oneOf:
        - type: string
        - type: 'null'
      description: Sanitized, user-facing reason; non-null for skipped/failed, null for success.

QualityProfilesPreview:
  type: object
  required:
    - section
    - customFormats
    - qualityProfiles
  properties:
    section:
      type: string
      enum:
        - qualityProfiles
    customFormats:
      type: array
      items:
        $ref: '#/EntityChange'
      description: Custom-format change set
    qualityProfiles:
      type: array
      items:
        $ref: '#/EntityChange'
      description: Quality-profile change set

DelayProfilesPreview:
  type: object
  required:
    - section
    - profile
  properties:
    section:
      type: string
      enum:
        - delayProfiles
    profile:
      oneOf:
        - $ref: '#/EntityChange'
        - type: null
      description: Delay profile singleton section payload

MediaManagementPreview:
  type: object
  required:
    - section
    - naming
    - qualityDefinitions
    - mediaSettings
  properties:
    section:
      type: string
      enum:
        - mediaManagement
    naming:
      oneOf:
        - $ref: '#/EntityChange'
        - type: null
      description: Naming config diff
    qualityDefinitions:
      type: array
      items:
        $ref: '#/EntityChange'
      description: Quality definition change set
    mediaSettings:
      oneOf:
        - $ref: '#/EntityChange'
        - type: null
      description: Media settings config diff

MetadataProfilesPreview:
  type: object
  required:
    - section
    - profile
  properties:
    section:
      type: string
      enum:
        - metadataProfiles
    profile:
      oneOf:
        - $ref: '#/EntityChange'
        - type: null
      description: Lidarr metadata profile singleton diff

SyncPreviewSummary:
  type: object
  required:
    - totalCreates
    - totalUpdates
    - totalDeletes
    - totalUnchanged
  properties:
    totalCreates:
      type: integer
      minimum: 0
      description: Number of create actions
    totalUpdates:
      type: integer
      minimum: 0
      description: Number of update actions
    totalDeletes:
      type: integer
      minimum: 0
      description: Number of delete actions
    totalUnchanged:
      type: integer
      minimum: 0
      description: Number of unchanged entities

SyncPreviewSectionOutcome:
  type: object
  required:
    - section
    - skipped
    - failure
  properties:
    section:
      $ref: '#/SyncPreviewSection'
    skipped:
      type: boolean
      description: True when the section had no config to preview and was skipped.
    failure:
      oneOf:
        - $ref: '#/SyncPreviewFailureReason'
        - type: 'null'
      description: |
        Typed, safe section-level preview generation failure, or null when the section
        succeeded or was skipped. Replaces the former free-form `error` string.

SyncPreviewResult:
  type: object
  required:
    - id
    - instanceId
    - instanceName
    - arrType
    - createdAt
    - expiresAt
    - status
    - failure
    - sections
    - sectionOutcomes
    - qualityProfiles
    - delayProfiles
    - mediaManagement
    - metadataProfiles
    - summary
  properties:
    id:
      type: string
      description: Preview identifier
    instanceId:
      type: integer
      description: Target Arr instance ID
    instanceName:
      type: string
      description: Target Arr instance name
    arrType:
      type: string
      enum:
        - radarr
        - sonarr
        - lidarr
      description: Arr instance family
    createdAt:
      type: string
      format: date-time
      description: ISO 8601 timestamp when preview was generated
    expiresAt:
      type: string
      format: date-time
      description: ISO 8601 timestamp when preview becomes expired
    status:
      $ref: '#/SyncPreviewStatus'
    failure:
      oneOf:
        - $ref: '#/SyncPreviewFailureReason'
        - type: 'null'
      description: |
        Typed, safe top-level failure reason, set when whole-preview generation or apply
        failed; null on success and on partial generation (per-section failures live in
        `sectionOutcomes[].failure`). Replaces the former free-form `error` string.
    sections:
      type: array
      items:
        $ref: '#/SyncPreviewSection'
      description: Sections included in preview
    sectionOutcomes:
      type: array
      description: Per-section preview generation status used to enforce safe apply behavior.
      items:
        $ref: '#/SyncPreviewSectionOutcome'
    qualityProfiles:
      oneOf:
        - $ref: '#/QualityProfilesPreview'
        - type: null
    delayProfiles:
      oneOf:
        - $ref: '#/DelayProfilesPreview'
        - type: null
    mediaManagement:
      oneOf:
        - $ref: '#/MediaManagementPreview'
        - type: null
    metadataProfiles:
      oneOf:
        - $ref: '#/MetadataProfilesPreview'
        - type: null
    summary:
      $ref: '#/SyncPreviewSummary'
