ConfigHealthBand:
  type: string
  description: Health band derived from the 0–100 rollup. `unknown` means every enabled criterion was skipped.
  enum:
    - healthy
    - attention
    - needs-review
    - unknown

ConfigHealthArrType:
  type: string
  enum:
    - radarr
    - sonarr
    - lidarr

ConfigHealthTone:
  type: string
  description: Presentation hint for a suggestion; health tone never exceeds `warning`.
  enum:
    - neutral
    - info
    - warning
    - danger

ConfigHealthSuggestion:
  type: object
  description: A non-judgmental remediation line rendered through the shared narration surface.
  required:
    - headline
    - detail
    - tone
    - templateVersion
  properties:
    headline:
      type: string
    detail:
      type: array
      items:
        type: string
    tone:
      $ref: '#/ConfigHealthTone'
    templateVersion:
      type: string

ConfigHealthCriterion:
  type: object
  description: One criterion's contribution to a scored unit.
  required:
    - id
    - label
    - score
    - weight
    - contribution
    - detail
    - suggestions
  properties:
    id:
      type: string
      description: Criterion id — one of completeness, drift, coherence, compatibility, trash_alignment.
    label:
      type: string
    score:
      description: 0–100 sub-score, or null when the criterion could not be evaluated (excluded from the rollup).
      oneOf:
        - type: integer
          minimum: 0
          maximum: 100
        - type: 'null'
    weight:
      type: integer
      minimum: 0
    contribution:
      type: integer
    detail:
      type: array
      items:
        type: string
    suggestions:
      type: array
      items:
        $ref: '#/ConfigHealthSuggestion'

ConfigHealthScoredUnit:
  type: object
  description: A scored unit (whole instance or one profile) — the rollup number, its band, and the breakdown.
  required:
    - score
    - band
    - criteria
    - suggestions
  properties:
    score:
      type: integer
      minimum: 0
      maximum: 100
    band:
      $ref: '#/ConfigHealthBand'
    criteria:
      type: array
      items:
        $ref: '#/ConfigHealthCriterion'
    suggestions:
      type: array
      items:
        $ref: '#/ConfigHealthSuggestion'

ConfigHealthProfileHealth:
  allOf:
    - $ref: '#/ConfigHealthScoredUnit'
    - type: object
      required:
        - name
      properties:
        name:
          type: string

ConfigHealthInstanceSummary:
  type: object
  required:
    - instanceId
    - instanceName
    - arrType
    - score
    - band
    - generatedAt
  properties:
    instanceId:
      type: integer
    instanceName:
      type: string
    arrType:
      $ref: '#/ConfigHealthArrType'
    score:
      type: integer
      minimum: 0
      maximum: 100
    band:
      $ref: '#/ConfigHealthBand'
    generatedAt:
      type: string
      format: date-time

ConfigHealthTotals:
  type: object
  required:
    - instances
    - healthy
    - attention
    - needsReview
    - unknown
    - averageScore
  properties:
    instances:
      type: integer
    healthy:
      type: integer
    attention:
      type: integer
    needsReview:
      type: integer
    unknown:
      type: integer
    averageScore:
      description: Mean overall score across scored instances, or null when none could be scored.
      oneOf:
        - type: integer
          minimum: 0
          maximum: 100
        - type: 'null'

ConfigHealthSettingsSnapshot:
  type: object
  required:
    - enabled
    - intervalMinutes
  properties:
    enabled:
      type: boolean
    intervalMinutes:
      type: integer
      minimum: 5

ConfigHealthSummaryResponse:
  type: object
  required:
    - engineVersion
    - generatedAt
    - totals
    - settings
    - instances
  properties:
    engineVersion:
      type: string
    generatedAt:
      type: string
      format: date-time
    totals:
      $ref: '#/ConfigHealthTotals'
    settings:
      $ref: '#/ConfigHealthSettingsSnapshot'
    instances:
      type: array
      items:
        $ref: '#/ConfigHealthInstanceSummary'

ConfigHealthDetailResponse:
  type: object
  required:
    - instanceId
    - instanceName
    - arrType
    - engineVersion
    - generatedAt
    - overall
    - profiles
  properties:
    instanceId:
      type: integer
    instanceName:
      type: string
    arrType:
      $ref: '#/ConfigHealthArrType'
    engineVersion:
      type: string
    generatedAt:
      type: string
      format: date-time
    overall:
      $ref: '#/ConfigHealthScoredUnit'
    profiles:
      type: array
      items:
        $ref: '#/ConfigHealthProfileHealth'

ConfigHealthTrendPointState:
  type: string
  description: |
    Availability of the point's selected scope. `unknown` is persisted scoring without a measured
    score, `profile-missing` preserves a snapshot where the exact profile was absent, and
    `not-recorded` preserves snapshot identity when stored evidence is unusable.
  enum:
    - measured
    - unknown
    - profile-missing
    - not-recorded

ConfigHealthTrendCriterionState:
  type: string
  description: Availability of one persisted overall criterion observation.
  enum:
    - measured
    - not-evaluated
    - not-recorded

ConfigHealthTrendInstance:
  type: object
  required:
    - id
    - name
    - arrType
  properties:
    id:
      type: integer
    name:
      type: string
    arrType:
      $ref: '#/ConfigHealthArrType'

ConfigHealthTrendFilter:
  type: object
  description: |
    Applied absolute filter echoed for representation parity. `from=null` means unbounded history;
    `to` is captured once per request so a later export cannot acquire newer points. Profile matching
    preserves the exact persisted name.
  required:
    - from
    - to
    - profile
  properties:
    from:
      oneOf:
        - type: string
          format: date-time
        - type: 'null'
    to:
      type: string
      format: date-time
    profile:
      oneOf:
        - type: string
          minLength: 1
        - type: 'null'

ConfigHealthTrendRetention:
  type: object
  description: |
    Current global retention policy and observed availability for this instance. These values do not
    identify why any older point is absent or prove which retention rule removed it.
  required:
    - days
    - maxEntries
    - ageCutoffAt
    - oldestAvailableAt
    - newestAvailableAt
  properties:
    days:
      type: integer
      minimum: 1
    maxEntries:
      type: integer
      minimum: 1
    ageCutoffAt:
      type: string
      format: date-time
    oldestAvailableAt:
      oneOf:
        - type: string
          format: date-time
        - type: 'null'
    newestAvailableAt:
      oneOf:
        - type: string
          format: date-time
        - type: 'null'

ConfigHealthTrendCounts:
  type: object
  required:
    - points
    - measured
    - unknown
    - missing
  properties:
    points:
      type: integer
      minimum: 0
    measured:
      type: integer
      minimum: 0
    unknown:
      type: integer
      minimum: 0
    missing:
      type: integer
      minimum: 0
      description: Points whose selected evidence is profile-missing or not-recorded.

ConfigHealthTrendEngineBoundary:
  type: object
  description: Start of one contiguous persisted engine-version run in canonical point order.
  required:
    - engineVersion
    - startsAt
    - pointIndex
  properties:
    engineVersion:
      type: string
    startsAt:
      type: string
      format: date-time
    pointIndex:
      type: integer
      minimum: 0

ConfigHealthTrendCriterion:
  type: object
  description: |
    One persisted overall criterion observation. Profile-scoped points do not expose criteria.
    Nullable numeric fields remain distinct from measured zero.
  required:
    - id
    - label
    - state
    - score
    - weight
    - contribution
  properties:
    id:
      type: string
    label:
      type: string
    state:
      $ref: '#/ConfigHealthTrendCriterionState'
    score:
      oneOf:
        - type: integer
          minimum: 0
          maximum: 100
        - type: 'null'
    weight:
      oneOf:
        - type: integer
          minimum: 0
        - type: 'null'
    contribution:
      oneOf:
        - type: integer
        - type: 'null'

ConfigHealthTrendPoint:
  type: object
  description: One persisted snapshot observation in `generatedAt ASC, snapshotId ASC` order.
  required:
    - snapshotId
    - generatedAt
    - engineVersion
    - state
    - score
    - band
    - criteria
  properties:
    snapshotId:
      type: integer
      minimum: 1
    generatedAt:
      type: string
      format: date-time
    engineVersion:
      type: string
    state:
      $ref: '#/ConfigHealthTrendPointState'
    score:
      oneOf:
        - type: integer
          minimum: 0
          maximum: 100
        - type: 'null'
    band:
      oneOf:
        - $ref: '#/ConfigHealthBand'
        - type: 'null'
    criteria:
      type: array
      description: Persisted overall criterion observations; empty for exact-profile scope.
      items:
        $ref: '#/ConfigHealthTrendCriterion'

ConfigHealthTrendsResponse:
  type: object
  description: |
    Canonical bounded historical result shared by chart/table JSON and JSON/CSV export selection.
    Empty selections are successful and contain `points: []` with the same metadata shape.
  required:
    - instance
    - currentEngineVersion
    - normalizedFilter
    - retention
    - availableProfiles
    - counts
    - engineBoundaries
    - points
  properties:
    instance:
      $ref: '#/ConfigHealthTrendInstance'
    currentEngineVersion:
      type: string
    normalizedFilter:
      $ref: '#/ConfigHealthTrendFilter'
    retention:
      $ref: '#/ConfigHealthTrendRetention'
    availableProfiles:
      type: array
      description: Exact historical profile names in deterministic order.
      items:
        type: string
    counts:
      $ref: '#/ConfigHealthTrendCounts'
    engineBoundaries:
      type: array
      items:
        $ref: '#/ConfigHealthTrendEngineBoundary'
    points:
      type: array
      items:
        $ref: '#/ConfigHealthTrendPoint'

ConfigHealthCriterionConfig:
  type: object
  required:
    - id
    - enabled
    - weight
  properties:
    id:
      type: string
    enabled:
      type: boolean
    weight:
      type: integer
      minimum: 0

ConfigHealthCriterionMeta:
  type: object
  required:
    - id
    - label
    - description
  properties:
    id:
      type: string
    label:
      type: string
    description:
      type: string

ConfigHealthSettingsResponse:
  type: object
  required:
    - engineVersion
    - enabled
    - intervalMinutes
    - retentionDays
    - retentionMaxEntries
    - criteria
    - catalog
  properties:
    engineVersion:
      type: string
    enabled:
      type: boolean
    intervalMinutes:
      type: integer
      minimum: 5
    retentionDays:
      type: integer
      minimum: 1
    retentionMaxEntries:
      type: integer
      minimum: 1
    criteria:
      type: array
      items:
        $ref: '#/ConfigHealthCriterionConfig'
    catalog:
      type: array
      items:
        $ref: '#/ConfigHealthCriterionMeta'

ConfigHealthSettingsUpdateRequest:
  type: object
  description: Partial settings update. `expectedEngineVersion` guards against a stale client (409 on mismatch).
  required:
    - expectedEngineVersion
  properties:
    expectedEngineVersion:
      type: string
    enabled:
      type: boolean
    intervalMinutes:
      type: integer
      minimum: 5
    retentionDays:
      type: integer
      minimum: 1
    retentionMaxEntries:
      type: integer
      minimum: 1
    criteria:
      type: array
      items:
        $ref: '#/ConfigHealthCriterionConfig'
