EntityType:
  type: string
  description: |
    Portable PCD entity identifiers used by import/export endpoints.

    v1 Lidarr media-management strategy: reuse existing entities.
    Lidarr maps to existing Radarr/Sonarr entity shapes instead of dedicated
    `lidarr_*` entity types in this phase. Specifically:
    - naming -> `sonarr_naming`
    - media settings -> `radarr_media_settings` and `sonarr_media_settings`
    - quality definitions -> `radarr_quality_definitions` and
      `sonarr_quality_definitions`
    Downstream sync resolves the Lidarr arr_type against these shared shapes and
    capability-gates any Lidarr-only fields (e.g. naming formats,
    music-specific media-info fields) so behavior is deterministic: unsupported
    fields are explicitly skipped with logged reasons, never silently written or
    partially applied.

    No new entity enum values are added for Lidarr here (for example
    no `lidarr_naming`, `lidarr_media_settings`, or
    `lidarr_quality_definitions`). The `lidarr` arr_type
    is expressed in per-row `arr_type` columns (e.g. quality_profile_custom_formats,
    custom_format_conditions, quality_api_mappings) and in the
    PortableCustomFormatScore.arrType enum, not as a distinct entity family.

    Non-regression contract: existing Radarr/Sonarr media-management entity
    enum members remain unchanged in v1 (`radarr_naming`, `sonarr_naming`,
    `radarr_media_settings`, `sonarr_media_settings`,
    `radarr_quality_definitions`, `sonarr_quality_definitions`).
    Non-regression contract: `radarr_*` and `sonarr_*` entity enum members are
    preserved and no `lidarr_*` media-management members are introduced in v1.
  enum:
    - delay_profile
    - regular_expression
    - custom_format
    - quality_profile
    - radarr_naming
    - sonarr_naming
    - radarr_media_settings
    - sonarr_media_settings
    - radarr_quality_definitions
    - sonarr_quality_definitions

ExportResponse:
  type: object
  required:
    - entityType
    - data
  properties:
    entityType:
      $ref: '#/EntityType'
    data:
      description: |
        The portable entity payload. Shape varies by entityType:
        - `delay_profile` → PortableDelayProfile
        - `regular_expression` → PortableRegularExpression
        - `custom_format` → PortableCustomFormat
        - `quality_profile` → PortableQualityProfile (contains PortableCustomFormatScore with lidarr-aware arrType)
        - `radarr_naming` → PortableRadarrNaming
        - `sonarr_naming` → PortableSonarrNaming (shared for Lidarr and Sonarr in v1)
        - `radarr_media_settings` → PortableMediaSettings (reused for Lidarr in v1)
        - `sonarr_media_settings` → PortableMediaSettings (reused for Lidarr in v1)
        - `radarr_quality_definitions` → PortableQualityDefinitions (reused for Lidarr in v1)
        - `sonarr_quality_definitions` → PortableQualityDefinitions (reused for Lidarr in v1)

        v1 Lidarr reuse strategy:
        Lidarr media-management sync maps to existing `radarr_*`/`sonarr_*` entity
        shapes. No `lidarr_*` entity types exist in this phase. Unsupported Lidarr-only
        fields (e.g. music-specific naming tokens, artist/album media-info fields) are
        capability-gated: the sync layer explicitly skips them with deterministic,
        logged outcomes rather than silently writing partial data.
      oneOf:
        - $ref: '#/PortableDelayProfile'
        - $ref: '#/PortableRegularExpression'
        - $ref: '#/PortableCustomFormat'
        - $ref: '#/PortableQualityProfile'
        - $ref: '#/PortableRadarrNaming'
        - $ref: '#/PortableSonarrNaming'
        - $ref: '#/PortableMediaSettings'
        - $ref: '#/PortableQualityDefinitions'

ImportRequest:
  type: object
  required:
    - databaseId
    - layer
    - entityType
    - data
  properties:
    databaseId:
      type: integer
      description: The PCD database ID to import into
    layer:
      type: string
      enum: [user, base]
      description: The operation layer to write to
    entityType:
      $ref: '#/EntityType'
    data:
      description: The portable entity payload (same shape as ExportResponse.data)
      oneOf:
        - $ref: '#/PortableDelayProfile'
        - $ref: '#/PortableRegularExpression'
        - $ref: '#/PortableCustomFormat'
        - $ref: '#/PortableQualityProfile'
        - $ref: '#/PortableRadarrNaming'
        - $ref: '#/PortableSonarrNaming'
        - $ref: '#/PortableMediaSettings'
        - $ref: '#/PortableQualityDefinitions'

ImportResponse:
  type: object
  required:
    - success
  properties:
    success:
      type: boolean

PcdErrorResponse:
  type: object
  required:
    - error
  properties:
    error:
      type: string

# --- Portable entity schemas ---

PortableDelayProfile:
  type: object
  required:
    - name
    - preferredProtocol
    - usenetDelay
    - torrentDelay
    - bypassIfHighestQuality
    - bypassIfAboveCfScore
    - minimumCfScore
  properties:
    name:
      type: string
    preferredProtocol:
      type: string
      enum: [prefer_usenet, prefer_torrent, only_usenet, only_torrent]
    usenetDelay:
      type: integer
    torrentDelay:
      type: integer
    bypassIfHighestQuality:
      type: boolean
    bypassIfAboveCfScore:
      type: boolean
    minimumCfScore:
      type: integer

PortableRegularExpression:
  type: object
  required:
    - name
    - pattern
    - tags
    - description
    - regex101Id
  properties:
    name:
      type: string
    pattern:
      type: string
    tags:
      type: array
      items:
        type: string
    description:
      type: string
      nullable: true
    regex101Id:
      type: string
      nullable: true

PortableCustomFormatTest:
  type: object
  required:
    - title
    - type
    - shouldMatch
    - description
  properties:
    title:
      type: string
    type:
      type: string
      enum: [movie, series]
    shouldMatch:
      type: boolean
    description:
      type: string
      nullable: true

PortableCustomFormat:
  type: object
  required:
    - name
    - description
    - includeInRename
    - tags
    - conditions
    - tests
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    includeInRename:
      type: boolean
    tags:
      type: array
      items:
        type: string
    conditions:
      type: array
      items:
        type: object
        description: Condition data (shape varies by condition type)
    tests:
      type: array
      items:
        $ref: '#/PortableCustomFormatTest'

PortableCustomFormatScore:
  type: object
  required:
    - customFormatName
    - arrType
    - score
  properties:
    customFormatName:
      type: string
    arrType:
      type: string
      enum: [radarr, sonarr, lidarr, all]
      description: |
        Arr target for this score mapping. `lidarr` is a valid value for v1
        parity so quality profile custom-format scores can be scoped to Lidarr
        instances. `all` applies the score to every arr type. Unsupported
        Lidarr-only sync behavior (e.g. naming, music-specific media fields)
        remains capability-gated in the sync layer; this enum only governs
        score applicability, not full feature support.

        Non-regression contract: existing `radarr`, `sonarr`, and `all`
        enum semantics are unchanged; `lidarr` is an explicit additional arr
        target value and does not introduce fallback alias behavior.
    score:
      type: integer

PortableQualityProfile:
  type: object
  required:
    - name
    - description
    - tags
    - language
    - orderedItems
    - minimumScore
    - upgradeUntilScore
    - upgradeScoreIncrement
    - customFormatScores
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    tags:
      type: array
      items:
        type: string
    language:
      type: string
      nullable: true
    orderedItems:
      type: array
      items:
        type: object
        description: Ordered quality item (quality or group)
    minimumScore:
      type: integer
    upgradeUntilScore:
      type: integer
    upgradeScoreIncrement:
      type: integer
    customFormatScores:
      type: array
      items:
        $ref: '#/PortableCustomFormatScore'

PortableRadarrNaming:
  type: object
  required:
    - name
    - rename
    - movieFormat
    - movieFolderFormat
    - replaceIllegalCharacters
    - colonReplacementFormat
  properties:
    name:
      type: string
    rename:
      type: boolean
    movieFormat:
      type: string
    movieFolderFormat:
      type: string
    replaceIllegalCharacters:
      type: boolean
    colonReplacementFormat:
      type: string

PortableSonarrNaming:
  description: |
    Shared naming payload for Sonarr and v1 Lidarr media-management flows.
    Lidarr uses this payload shape with unsupported Sonarr source fields being
    filtered out during sync; no `lidarr_naming` entity exists in v1.
  type: object
  required:
    - name
    - rename
    - standardEpisodeFormat
    - dailyEpisodeFormat
    - animeEpisodeFormat
    - seriesFolderFormat
    - seasonFolderFormat
    - replaceIllegalCharacters
    - colonReplacementFormat
    - customColonReplacementFormat
    - multiEpisodeStyle
  properties:
    name:
      type: string
    rename:
      type: boolean
    standardEpisodeFormat:
      type: string
    dailyEpisodeFormat:
      type: string
    animeEpisodeFormat:
      type: string
    seriesFolderFormat:
      type: string
    seasonFolderFormat:
      type: string
    replaceIllegalCharacters:
      type: boolean
    colonReplacementFormat:
      type: string
    customColonReplacementFormat:
      type: string
      nullable: true
    multiEpisodeStyle:
      type: string

PortableMediaSettings:
  type: object
  description: |
    Shared media-management settings payload for Radarr, Sonarr, and (in v1)
    Lidarr entity families. Lidarr reuses this shape rather than introducing
    `lidarr_media_settings` entities; the sync layer maps Lidarr instances to
    the applicable `radarr_media_settings` or `sonarr_media_settings` entity
    type and capability-gates any Lidarr-only fields not present here (e.g.
    music-specific media-info flags). Unsupported fields are explicitly
    skipped with logged reasons so sync outcomes are deterministic and
    testable.
  required:
    - name
    - propersRepacks
    - enableMediaInfo
  properties:
    name:
      type: string
    propersRepacks:
      type: string
    enableMediaInfo:
      type: boolean

PortableQualityDefinitions:
  type: object
  description: |
    Shared quality-definition payload for Radarr, Sonarr, and (in v1) Lidarr
    entity families. Lidarr reuses this shape rather than introducing
    `lidarr_quality_definitions` entities; the sync layer maps Lidarr
    instances to the applicable `radarr_quality_definitions` or
    `sonarr_quality_definitions` entity type and capability-gates any
    Lidarr-only fields not present here. Unsupported fields are explicitly
    skipped with logged reasons so sync outcomes are deterministic and
    testable.
  required:
    - name
    - entries
  properties:
    name:
      type: string
    entries:
      type: array
      items:
        type: object
        description: Quality definition entry with min/max/preferred sizes
