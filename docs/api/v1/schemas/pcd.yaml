EntityType:
  type: string
  description: |
    Portable PCD entity identifiers used by import/export endpoints.

    Lidarr media-management entities are first-class portable contract members:
    - `lidarr_naming`
    - `lidarr_media_settings`
    - `lidarr_quality_definitions`

    Runtime validation is deterministic and fail-fast for Lidarr payloads:
    payloads are rejected when required fields are missing, when unsupported
    fields are present, or when cross-family fields are mixed into the payload
    (for example Radarr naming fields with `lidarr_naming`).

    Temporary legacy aliases may still be accepted by runtime import paths for
    backwards compatibility, but clients should emit `lidarr_*` entity types for
    Lidarr entities.
  enum:
    - delay_profile
    - regular_expression
    - custom_format
    - quality_profile
    - radarr_naming
    - sonarr_naming
    - radarr_media_settings
    - sonarr_media_settings
    - radarr_quality_definitions
    - sonarr_quality_definitions
    - lidarr_naming
    - lidarr_media_settings
    - lidarr_quality_definitions

ExportResponse:
  type: object
  required:
    - entityType
    - data
  properties:
    entityType:
      $ref: '#/EntityType'
    data:
      description: |
        The portable entity payload. Shape varies by entityType:
        - `delay_profile` → PortableDelayProfile
        - `regular_expression` → PortableRegularExpression
        - `custom_format` → PortableCustomFormat
        - `quality_profile` → PortableQualityProfile (contains PortableCustomFormatScore with lidarr-aware arrType)
        - `radarr_naming` → PortableRadarrNaming
        - `sonarr_naming` → PortableSonarrNaming
        - `lidarr_naming` → PortableLidarrNaming
        - `radarr_media_settings` → PortableMediaSettings
        - `sonarr_media_settings` → PortableMediaSettings
        - `lidarr_media_settings` → PortableLidarrMediaSettings
        - `radarr_quality_definitions` → PortableQualityDefinitions
        - `sonarr_quality_definitions` → PortableQualityDefinitions
        - `lidarr_quality_definitions` → PortableLidarrQualityDefinitions

        `lidarr_*` payloads are validated against strict allowlists so mixed
        cross-family payloads fail fast during import.
      oneOf:
        - $ref: '#/PortableDelayProfile'
        - $ref: '#/PortableRegularExpression'
        - $ref: '#/PortableCustomFormat'
        - $ref: '#/PortableQualityProfile'
        - $ref: '#/PortableRadarrNaming'
        - $ref: '#/PortableSonarrNaming'
        - $ref: '#/PortableMediaSettings'
        - $ref: '#/PortableQualityDefinitions'

ImportRequest:
  type: object
  required:
    - databaseId
    - layer
    - entityType
    - data
  properties:
    databaseId:
      type: integer
      description: The PCD database ID to import into
    layer:
      type: string
      enum: [user, base]
      description: The operation layer to write to
    entityType:
      $ref: '#/EntityType'
    data:
      description: |
        The portable entity payload (same shape as ExportResponse.data).
        For `lidarr_*` entity types, runtime validation rejects mixed
        cross-family payload fields and unknown fields.
      oneOf:
        - $ref: '#/PortableDelayProfile'
        - $ref: '#/PortableRegularExpression'
        - $ref: '#/PortableCustomFormat'
        - $ref: '#/PortableQualityProfile'
        - $ref: '#/PortableRadarrNaming'
        - $ref: '#/PortableSonarrNaming'
        - $ref: '#/PortableMediaSettings'
        - $ref: '#/PortableQualityDefinitions'

ImportResponse:
  type: object
  required:
    - success
  properties:
    success:
      type: boolean

PcdErrorResponse:
  type: object
  required:
    - error
  properties:
    error:
      type: string

# --- Portable entity schemas ---

PortableDelayProfile:
  type: object
  required:
    - name
    - preferredProtocol
    - usenetDelay
    - torrentDelay
    - bypassIfHighestQuality
    - bypassIfAboveCfScore
    - minimumCfScore
  properties:
    name:
      type: string
    preferredProtocol:
      type: string
      enum: [prefer_usenet, prefer_torrent, only_usenet, only_torrent]
    usenetDelay:
      type: integer
    torrentDelay:
      type: integer
    bypassIfHighestQuality:
      type: boolean
    bypassIfAboveCfScore:
      type: boolean
    minimumCfScore:
      type: integer

PortableRegularExpression:
  type: object
  required:
    - name
    - pattern
    - tags
    - description
    - regex101Id
  properties:
    name:
      type: string
    pattern:
      type: string
    tags:
      type: array
      items:
        type: string
    description:
      type: string
      nullable: true
    regex101Id:
      type: string
      nullable: true

PortableCustomFormatTest:
  type: object
  required:
    - title
    - type
    - shouldMatch
    - description
  properties:
    title:
      type: string
    type:
      type: string
      enum: [movie, series]
    shouldMatch:
      type: boolean
    description:
      type: string
      nullable: true

PortableCustomFormat:
  type: object
  required:
    - name
    - description
    - includeInRename
    - tags
    - conditions
    - tests
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    includeInRename:
      type: boolean
    tags:
      type: array
      items:
        type: string
    conditions:
      type: array
      items:
        type: object
        description: Condition data (shape varies by condition type)
    tests:
      type: array
      items:
        $ref: '#/PortableCustomFormatTest'

PortableCustomFormatScore:
  type: object
  required:
    - customFormatName
    - arrType
    - score
  properties:
    customFormatName:
      type: string
    arrType:
      type: string
      enum: [radarr, sonarr, lidarr, all]
      description: |
        Arr target for this score mapping. `lidarr` is a valid value for v1
        parity so quality profile custom-format scores can be scoped to Lidarr
        instances. `all` applies the score to every arr type. Unsupported
        Lidarr-only sync behavior (e.g. naming, music-specific media fields)
        remains capability-gated in the sync layer; this enum only governs
        score applicability, not full feature support.

        Non-regression contract: existing `radarr`, `sonarr`, and `all`
        enum semantics are unchanged; `lidarr` is an explicit additional arr
        target value and does not introduce fallback alias behavior.
    score:
      type: integer

PortableQualityProfile:
  type: object
  required:
    - name
    - description
    - tags
    - language
    - orderedItems
    - minimumScore
    - upgradeUntilScore
    - upgradeScoreIncrement
    - customFormatScores
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    tags:
      type: array
      items:
        type: string
    language:
      type: string
      nullable: true
    orderedItems:
      type: array
      items:
        type: object
        description: Ordered quality item (quality or group)
    minimumScore:
      type: integer
    upgradeUntilScore:
      type: integer
    upgradeScoreIncrement:
      type: integer
    customFormatScores:
      type: array
      items:
        $ref: '#/PortableCustomFormatScore'

PortableRadarrNaming:
  type: object
  required:
    - name
    - rename
    - movieFormat
    - movieFolderFormat
    - replaceIllegalCharacters
    - colonReplacementFormat
  properties:
    name:
      type: string
    rename:
      type: boolean
    movieFormat:
      type: string
    movieFolderFormat:
      type: string
    replaceIllegalCharacters:
      type: boolean
    colonReplacementFormat:
      type: string

PortableSonarrNaming:
  description: |
    Portable naming payload for Sonarr entities.
  type: object
  required:
    - name
    - rename
    - standardEpisodeFormat
    - dailyEpisodeFormat
    - animeEpisodeFormat
    - seriesFolderFormat
    - seasonFolderFormat
    - replaceIllegalCharacters
    - colonReplacementFormat
    - customColonReplacementFormat
    - multiEpisodeStyle
  properties:
    name:
      type: string
    rename:
      type: boolean
    standardEpisodeFormat:
      type: string
    dailyEpisodeFormat:
      type: string
    animeEpisodeFormat:
      type: string
    seriesFolderFormat:
      type: string
    seasonFolderFormat:
      type: string
    replaceIllegalCharacters:
      type: boolean
    colonReplacementFormat:
      type: string
    customColonReplacementFormat:
      type: string
      nullable: true
    multiEpisodeStyle:
      type: string

PortableLidarrNaming:
  description: |
    First-class portable naming payload for `lidarr_naming`.
    Runtime import validation rejects unsupported cross-family fields from
    both Radarr and Sonarr naming models.
  type: object
  required:
    - name
    - renameTracks
    - standardTrackFormat
    - multiDiscTrackFormat
    - artistFolderFormat
    - replaceIllegalCharacters
    - colonReplacementFormat
  properties:
    name:
      type: string
    renameTracks:
      type: boolean
    standardTrackFormat:
      type: string
    multiDiscTrackFormat:
      type: string
    artistFolderFormat:
      type: string
    replaceIllegalCharacters:
      type: boolean
    colonReplacementFormat:
      type: string
      enum: [delete, dash, spaceDash, spaceDashSpace, smart]

PortableMediaSettings:
  type: object
  description: |
    Shared media-management settings payload shape used by Radarr, Sonarr, and
    Lidarr entity families.
  required:
    - name
    - propersRepacks
    - enableMediaInfo
  properties:
    name:
      type: string
    propersRepacks:
      type: string
    enableMediaInfo:
      type: boolean

PortableLidarrMediaSettings:
  description: |
    First-class portable payload for `lidarr_media_settings`.
    The shape currently matches `PortableMediaSettings`.
  allOf:
    - $ref: '#/PortableMediaSettings'

PortableQualityDefinitions:
  type: object
  description: |
    Shared quality-definition payload shape used by Radarr, Sonarr, and Lidarr
    entity families.
  required:
    - name
    - entries
  properties:
    name:
      type: string
    entries:
      type: array
      items:
        type: object
        description: Quality definition entry with min/max/preferred sizes

PortableLidarrQualityDefinitions:
  description: |
    First-class portable payload for `lidarr_quality_definitions`.
    The shape currently matches `PortableQualityDefinitions`.
  allOf:
    - $ref: '#/PortableQualityDefinitions'
