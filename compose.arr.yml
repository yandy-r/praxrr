# Test Radarr/Sonarr instances for sync development
# Usage: docker compose -f compose.arr.yml up -d
#        deno task arr

services:
  radarr:
    container_name: profilarr-radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    ports:
      - 17878:7878
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/radarr:/config
      - ./.arr/radarr/data:/data

  sonarr:
    container_name: profilarr-sonarr
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    ports:
      - 18989:8989
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/sonarr:/config
      - ./.arr/sonarr/data:/data

  lidarr:
    container_name: profilarr-lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    ports:
      - 18686:8686
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/lidarr:/config
      - ./.arr/lidarr/data:/data
