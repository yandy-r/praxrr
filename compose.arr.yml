# Test Radarr/Sonarr instances for sync development
# Usage: docker compose -f compose.arr.yml up -d
#        deno task arr

# Optional app-runtime env examples (not used by this compose stack unless you add app services):
# AUTH=off
# PRAXRR_DEFAULT_DB_URL=https://github.com/your-org/praxrr-db
# PRAXRR_DEFAULT_DB_BRANCH=main
# PRAXRR_DEFAULT_DB_NAME=praxrr-db
# PRAXRR_DEFAULT_DB_GIT_USERNAME=praxrr-bot
# PRAXRR_DEFAULT_DB_GIT_EMAIL=you@example.com

services:
  radarr:
    container_name: praxrr-radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    ports:
      - 17878:7878
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/radarr:/config
      - ./.arr/radarr/data:/data

  sonarr:
    container_name: praxrr-sonarr
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    ports:
      - 18989:8989
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/sonarr:/config
      - ./.arr/sonarr/data:/data

  lidarr:
    container_name: praxrr-lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    ports:
      - 18686:8686
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
    volumes:
      - ./.arr/lidarr:/config
      - ./.arr/lidarr/data:/data
