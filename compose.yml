services:
  praxrr:
    image: ghcr.io/yandy-r/praxrr:v2
    container_name: praxrr-prod
    restart: unless-stopped
    ports:
      - '6969:6868'
    volumes:
      - ./config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=022
      - TZ=Etc/UTC
      # - PORT=6868
      # - HOST=0.0.0.0
      - PARSER_HOST=parser
      - PARSER_PORT=5000
      # - AUTH=off
      - PRAXRR_DEFAULT_DB_URL=https://github.com/${PRAXRR_DEFAULT_DB_GIT_USERNAME}/praxrr-db
      - PRAXRR_DEFAULT_DB_BRANCH=dev
      - PRAXRR_DEFAULT_DB_NAME=Praxrr-db
      - PRAXRR_DEFAULT_DB_TOKEN=${PRAXRR_DEFAULT_DB_TOKEN}
      - PRAXRR_DEFAULT_DB_GIT_USERNAME=${PRAXRR_DEFAULT_DB_GIT_USERNAME}
      - PRAXRR_DEFAULT_DB_GIT_EMAIL=${PRAXRR_DEFAULT_DB_GIT_EMAIL}
      - PRAXRR_SCHEMA_REF=v2
      # Optional Arr instances via environment at startup
      - LIDARR_INSTANCE_URL_1=${PRAXRR_LIDARR_URL}
      - LIDARR_INSTANCE_API_KEY_1=${PRAXRR_LIDARR_API_KEY}
      - LIDARR_INSTANCE_NAME_1=Lidarr
      - RADARR_INSTANCE_URL_1=${PRAXRR_RADARR_URL}
      - RADARR_INSTANCE_API_KEY_1=${PRAXRR_RADARR_API_KEY}
      - RADARR_INSTANCE_NAME_1=Radarr
      - RADARR_INSTANCE_TAGS_1=movies,4k
      - SONARR_INSTANCE_URL_1=${PRAXRR_SONARR_URL}
      - SONARR_INSTANCE_API_KEY_1=${PRAXRR_SONARR_API_KEY}
      - SONARR_INSTANCE_NAME_1=Sonarr
      - PRAXRR_VALIDATE_INSTANCES=false
    depends_on:
      parser:
        condition: service_healthy

  # Optional - only needed for CF/QP testing features
  parser:
    image: ghcr.io/yandy-r/praxrr-parser:v2
    container_name: praxrr-parser
    restart: unless-stopped
    expose:
      - '5000'
